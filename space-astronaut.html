<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020010;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .scene-container {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-width: 100vw;
    max-height: 100vh;
  }
  @media (min-aspect-ratio: 16/9) {
    .scene-container {
      height: 100vh;
      width: 177.78vh;
    }
  }
  svg { width: 100%; height: 100%; image-rendering: pixelated; }

  /* ===== ASTRONAUT FLOAT ===== */
  @keyframes astroFloat {
    0%   { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(1px, -3px) rotate(0.5deg); }
    50%  { transform: translate(0, -5px) rotate(0deg); }
    75%  { transform: translate(-1px, -3px) rotate(-0.5deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }
  .astronaut-group {
    animation: astroFloat 8s ease-in-out infinite;
    transform-origin: 30px 120px;
  }

  /* ===== SPRITE FRAMES ===== */
  .astroFrame { opacity: 0; }
  .astroFrame0 { animation: spriteF0 2.4s steps(1) infinite; }
  .astroFrame1 { animation: spriteF1 2.4s steps(1) infinite; }
  .astroFrame2 { animation: spriteF2 2.4s steps(1) infinite; }
  .astroFrame3 { animation: spriteF3 2.4s steps(1) infinite; }
  @keyframes spriteF0 { 0%,24.9%{opacity:1} 25%,100%{opacity:0} }
  @keyframes spriteF1 { 0%,24.9%{opacity:0} 25%,49.9%{opacity:1} 50%,100%{opacity:0} }
  @keyframes spriteF2 { 0%,49.9%{opacity:0} 50%,74.9%{opacity:1} 75%,100%{opacity:0} }
  @keyframes spriteF3 { 0%,74.9%{opacity:0} 75%,99.9%{opacity:1} }

  /* ===== STAR SCROLL ===== */
  @keyframes scrollFar {
    from { transform: translateX(0); }
    to   { transform: translateX(-426px); }
  }
  @keyframes scrollMid {
    from { transform: translateX(0); }
    to   { transform: translateX(-426px); }
  }
  @keyframes scrollNear {
    from { transform: translateX(0); }
    to   { transform: translateX(-426px); }
  }
  .stars-far  { animation: scrollFar  120s linear infinite; }
  .stars-mid  { animation: scrollMid  80s linear infinite; }
  .stars-near { animation: scrollNear 50s linear infinite; }

  /* ===== NEBULA SCROLL ===== */
  @keyframes scrollNebula {
    from { transform: translateX(0); }
    to   { transform: translateX(-426px); }
  }
  .nebula-layer { animation: scrollNebula 200s linear infinite; }

  /* ===== TETHER SWAY ===== */
  @keyframes tetherSway {
    0%   { d: path("M20,120 Q10,122 0,119 Q-10,116 -20,118"); }
    33%  { d: path("M20,120 Q10,124 0,121 Q-10,118 -20,121"); }
    66%  { d: path("M20,120 Q10,120 0,117 Q-10,114 -20,116"); }
    100% { d: path("M20,120 Q10,122 0,119 Q-10,116 -20,118"); }
  }
  .tether-line { animation: tetherSway 10s ease-in-out infinite; }

  /* ===== STAR TWINKLE ===== */
  @keyframes twinkle1 { 0%,100%{opacity:.2}50%{opacity:.8} }
  @keyframes twinkle2 { 0%,100%{opacity:.5}50%{opacity:.15} }
  @keyframes twinkle3 { 0%,100%{opacity:.6}50%{opacity:.2} }
  .tw1 { animation: twinkle1 3s ease-in-out infinite; }
  .tw2 { animation: twinkle2 4s ease-in-out infinite 1s; }
  .tw3 { animation: twinkle3 5s ease-in-out infinite 2s; }
  .tw4 { animation: twinkle1 3.5s ease-in-out infinite 0.5s; }
  .tw5 { animation: twinkle2 4.5s ease-in-out infinite 1.5s; }
  .tw6 { animation: twinkle3 2.8s ease-in-out infinite 0.8s; }
</style>

  // ========================================
  // ASTRONAUT SPRITE (pixel art, 4 frames)
  // ========================================
  (function renderAstronaut() {
    const S = 2;    // each "pixel" = 2×2 SVG units
    const OX = 20;  // x origin (left edge of character)
    const OY = 105; // y origin (top of helmet)

    // Color palette (matches reference images)
    const C = {
      '1': '#1a1c30',  // dark navy suit / helmet body
      '2': '#0e0f1e',  // very dark outline / shadow
      '6': '#b0b4cc',  // silver-white helmet highlight
      '3': '#c4a600',  // gold visor
      '4': '#ead800',  // bright gold visor center
      '5': '#dd1100',  // red indicator light
      'M': '#2a2c48',  // medium suit seam/edge
    };

    // Static rows 0-9: helmet + neck + upper body
    // 10 columns (0-9), each char = one pixel
    const TOP = [
      '..111111..',  // row 0: helmet top arc
      '.11111111.',  // row 1: helmet
      '.16111111.',  // row 2: helmet (6=silver highlight upper-left)
      '.11111111.',  // row 3: helmet mid
      '5113333115',  // row 4: visor top + red indicators at col0,9
      '.11444411.',  // row 5: visor bright center
      '.11333311.',  // row 6: visor lower gold
      '.11111111.',  // row 7: helmet bottom
      '..111111..',  // row 8: neck/collar
      '.11111111.',  // row 9: shoulders / upper body
    ];

    // Variable rows 10-11: arm positions differ per frame
    // Frame 0: arms extended horizontally (base pose)
    // Frame 1: arms raised (up one row)
    // Frame 2: arms fully spread wide
    // Frame 3: arms lowered (down one row)
    const FRAMES = [
      ['.11111111.', '11.1111.11'],  // frame 0: body / arms-mid
      ['11.1111.11', '.11111111.'],  // frame 1: arms-mid / body
      ['1111111111', '..111111..'],  // frame 2: arms-wide / body-narrow
      ['..111111..', '1111111111'],  // frame 3: body-narrow / arms-wide
    ];

    // Static rows 12-14: lower body + legs + boots
    const BOT = [
      '...1111...',  // row 12: hips
      '...11.11..',  // row 13: upper legs
      '..111.111.',  // row 14: boots
    ];

    const NS = 'http://www.w3.org/2000/svg';
    const layer = document.getElementById('astronautLayer');

    for (let f = 0; f < 4; f++) {
      const g = document.createElementNS(NS, 'g');
      g.setAttribute('class', 'astroFrame astroFrame' + f);
      const allRows = [...TOP, ...FRAMES[f], ...BOT];
      allRows.forEach((row, ri) => {
        for (let ci = 0; ci < row.length; ci++) {
          const ch = row[ci];
          if (!C[ch]) continue;
          const r = document.createElementNS(NS, 'rect');
          r.setAttribute('x', ci * S + OX);
          r.setAttribute('y', ri * S + OY);
          r.setAttribute('width', S);
          r.setAttribute('height', S);
          r.setAttribute('fill', C[ch]);
          g.appendChild(r);
        }
      });
      layer.appendChild(g);
    }
  })();

  // ========================================
  // HELMET LIGHT BLINK
  // ========================================
  (function initHelmetLight() {
    const light = document.getElementById('helmetLight');
    let on = true;
    setInterval(() => {
      on = !on;
      light.setAttribute('opacity', on ? '0.9' : '0.1');
      light.setAttribute('fill', on ? '#44ff44' : '#1a4420');
    }, 1200);
  })();

  // ========================================
  // CELESTIAL OBJECTS (planets, distant ships, etc.)
  // ========================================
  (function initCelestial() {
    const svgNS = "http://www.w3.org/2000/svg";
    const layer = document.getElementById('celestialLayer');

    const PLANET_TYPES = [
      { // Gas giant (orange/red)
        r: 12, colors: ['#cc6633', '#aa4422', '#dd7744', '#993311'],
        ring: false, bandCount: 4
      },
      { // Ice planet (blue)
        r: 8, colors: ['#3355aa', '#224488', '#4466bb', '#113366'],
        ring: false, bandCount: 3
      },
      { // Ringed planet (saturn-like)
        r: 10, colors: ['#ccaa66', '#aa8844', '#ddbb77', '#887733'],
        ring: true, bandCount: 4
      },
      { // Small rocky (grey)
        r: 5, colors: ['#777788', '#666677', '#888899', '#555566'],
        ring: false, bandCount: 2
      },
      { // Green/teal planet
        r: 7, colors: ['#338866', '#226644', '#44aa77', '#115533'],
        ring: false, bandCount: 3
      }
    ];

    function spawnPlanet() {
      const type = PLANET_TYPES[Math.floor(Math.random() * PLANET_TYPES.length)];
      const y = 20 + Math.random() * 200;
      const startX = 440;
      const scale = 0.5 + Math.random() * 1.0;
      const r = Math.round(type.r * scale);
      const speed = 15000 + Math.random() * 25000; // ms to cross
      const g = document.createElementNS(svgNS, "g");

      // Planet body (pixel circle approximation with rects)
      const cx = 0;
      const cy = 0;
      for (let dy = -r; dy <= r; dy++) {
        const halfW = Math.round(Math.sqrt(r * r - dy * dy));
        if (halfW <= 0) continue;
        // Pick band color
        const bandIdx = Math.floor(((dy + r) / (2 * r)) * type.bandCount) % type.colors.length;
        const rect = document.createElementNS(svgNS, "rect");
        rect.setAttribute("x", cx - halfW);
        rect.setAttribute("y", cy + dy);
        rect.setAttribute("width", halfW * 2);
        rect.setAttribute("height", 1);
        rect.setAttribute("fill", type.colors[bandIdx]);
        rect.setAttribute("opacity", (0.4 + scale * 0.3).toFixed(2));
        g.appendChild(rect);
      }

      // Ring for saturn-like
      if (type.ring && r >= 6) {
        const ringW = r * 2.2;
        const ringH = r * 0.3;
        for (let dx = -Math.round(ringW); dx <= Math.round(ringW); dx++) {
          const ry = Math.round(ringH * Math.sqrt(1 - (dx / ringW) * (dx / ringW)));
          if (ry <= 0) continue;
          // Only draw ring parts outside the planet
          if (Math.abs(dx) > r * 0.8) {
            const rr = document.createElementNS(svgNS, "rect");
            rr.setAttribute("x", cx + dx);
            rr.setAttribute("y", cy - ry);
            rr.setAttribute("width", 1);
            rr.setAttribute("height", 1);
            rr.setAttribute("fill", "#ddcc88");
            rr.setAttribute("opacity", "0.3");
            g.appendChild(rr);
            const rr2 = document.createElementNS(svgNS, "rect");
            rr2.setAttribute("x", cx + dx);
            rr2.setAttribute("y", cy + ry);
            rr2.setAttribute("width", 1);
            rr2.setAttribute("height", 1);
            rr2.setAttribute("fill", "#ccbb77");
            rr2.setAttribute("opacity", "0.25");
            g.appendChild(rr2);
          }
        }
      }

      g.setAttribute("transform", `translate(${startX},${y})`);
      layer.appendChild(g);

      const anim = g.animate([
        { transform: `translate(${startX}px, ${y}px)` },
        { transform: `translate(-50px, ${y}px)` }
      ], { duration: speed, easing: 'linear', fill: 'forwards' });

      anim.onfinish = () => g.remove();
      setTimeout(spawnPlanet, 8000 + Math.random() * 20000);
    }

    // Start first planet after a short delay
    setTimeout(spawnPlanet, 2000 + Math.random() * 5000);
  })();

  // ========================================
  // SHOOTING STARS
  // ========================================
  (function initShootingStars() {
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.getElementById('mainSvg');

    function spawn() {
      const x = 50 + Math.random() * 380;
      const y = 5 + Math.random() * 80;
      const len = 20 + Math.random() * 30;
      const angle = 10 + Math.random() * 25;
      const rad = angle * Math.PI / 180;
      const dx = Math.cos(rad) * len;
      const dy = Math.sin(rad) * len;
      const duration = 400 + Math.random() * 400;

      const g = document.createElementNS(svgNS, "g");
      const tail = document.createElementNS(svgNS, "line");
      tail.setAttribute("x1", x);
      tail.setAttribute("y1", y);
      tail.setAttribute("x2", x + dx);
      tail.setAttribute("y2", y + dy);
      tail.setAttribute("stroke", "#aaccff");
      tail.setAttribute("stroke-width", "1");
      tail.setAttribute("stroke-opacity", "0.4");
      const head = document.createElementNS(svgNS, "rect");
      head.setAttribute("x", x + dx - 1);
      head.setAttribute("y", y + dy - 1);
      head.setAttribute("width", "2");
      head.setAttribute("height", "2");
      head.setAttribute("fill", "#ddeeff");
      g.appendChild(tail);
      g.appendChild(head);
      svg.appendChild(g);

      const anim = g.animate([
        { opacity: 0, transform: 'translate(0,0)' },
        { opacity: 1, transform: `translate(${dx * 0.1}px,${dy * 0.1}px)`, offset: 0.06 },
        { opacity: 0.7, transform: `translate(${dx * 0.5}px,${dy * 0.5}px)`, offset: 0.4 },
        { opacity: 0, transform: `translate(${dx * 2}px,${dy * 2}px)` }
      ], { duration, easing: 'linear', fill: 'forwards' });
      anim.onfinish = () => g.remove();

      setTimeout(spawn, 6000 + Math.random() * 15000);
    }
    setTimeout(spawn, 4000 + Math.random() * 6000);
  })();

  // ========================================
  // WEB AUDIO — AMBIENT SPACE SOUND
  // ========================================
  let audioCtx = null;
  let masterGain = null;
  let allSources = [];

  function createSpaceSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('vSl').value) / 100;
    masterGain.connect(audioCtx.destination);

    // ============================
    // LAYER 1: Deep space drone (very low frequency hum)
    // ============================
    playLoop(createBrownNoise(8), 'lowpass', 60, 0.5, 0.25);

    // ============================
    // LAYER 2: Mid-range ambience (filtered noise)
    // ============================
    playLoop(createBrownNoise(6), 'bandpass', 200, 2.0, 0.08);

    // ============================
    // LAYER 3: High ethereal shimmer
    // ============================
    playLoop(createPinkNoise(6), 'highpass', 3000, 0.3, 0.03);

    // ============================
    // LAYER 4: Subtle breathing rhythm
    // ============================
    startBreathing();

    // ============================
    // LAYER 5: Occasional radio blips
    // ============================
    startRadioBlips();
  }

  function createBrownNoise(seconds) {
    const len = audioCtx.sampleRate * seconds;
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let v = 0;
    for (let i = 0; i < len; i++) {
      v = (v + (Math.random() * 2 - 1) * 0.02) / 1.02;
      data[i] = v * 3.5;
    }
    return buffer;
  }

  function createPinkNoise(seconds) {
    const len = audioCtx.sampleRate * seconds;
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
      b6 = white * 0.115926;
    }
    return buffer;
  }

  function playLoop(buffer, filterType, filterFreq, filterQ, volume) {
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = filterType;
    filter.frequency.value = filterFreq;
    filter.Q.value = filterQ;
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    source.start();
    allSources.push({ source, gain });
  }

  function startBreathing() {
    // Simulate subtle breathing with oscillating filtered noise
    const bufLen = audioCtx.sampleRate * 4;
    const buffer = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    const sr = audioCtx.sampleRate;
    const breathCycle = 4; // seconds per breath
    let v = 0;
    for (let i = 0; i < bufLen; i++) {
      v = (v + (Math.random() * 2 - 1) * 0.02) / 1.02;
      const t = i / sr;
      // Breathing envelope: inhale-pause-exhale
      const phase = (t % breathCycle) / breathCycle;
      let env;
      if (phase < 0.35) {
        // Inhale
        env = Math.sin(phase / 0.35 * Math.PI * 0.5);
      } else if (phase < 0.45) {
        // Pause
        env = 1.0;
      } else if (phase < 0.85) {
        // Exhale (longer)
        env = Math.cos((phase - 0.45) / 0.4 * Math.PI * 0.5);
      } else {
        // Pause
        env = 0;
      }
      data[i] = v * env * 2.5;
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 400;
    filter.Q.value = 3.0;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.06;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    source.start();
    allSources.push({ source, gain });
  }

  function startRadioBlips() {
    function blip() {
      if (!audioCtx || audioCtx.state !== 'running') {
        setTimeout(blip, 3000 + Math.random() * 8000);
        return;
      }
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 800 + Math.random() * 400;
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.04, now + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + 0.12);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.15);

      // Sometimes double-blip
      if (Math.random() < 0.3) {
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = osc.frequency.value * 1.2;
        const gain2 = audioCtx.createGain();
        gain2.gain.setValueAtTime(0, now + 0.18);
        gain2.gain.linearRampToValueAtTime(0.03, now + 0.2);
        gain2.gain.linearRampToValueAtTime(0, now + 0.3);
        osc2.connect(gain2);
        gain2.connect(masterGain);
        osc2.start(now + 0.18);
        osc2.stop(now + 0.35);
      }

      setTimeout(blip, 5000 + Math.random() * 12000);
    }
    setTimeout(blip, 3000 + Math.random() * 5000);
  }

  initSceneAudio({
    onStart() {
      if (!audioCtx) { createSpaceSound(); } else { audioCtx.resume(); }
    },
    onStop() {
      if (audioCtx) audioCtx.suspend();
    },
    onVolumeChange(v) {
      if (masterGain) {
        masterGain.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.1);
      }
    }
  });
</script>
