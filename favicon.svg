<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0a0a12"/>
  <!-- 3x3 pixel grid: 4px cells, 1px dark gaps, 1px margin
       "Z" block pattern — a timeless pixel art motif
       Row 0: col 0, col 1  lit
       Row 1:       col 1  lit
       Row 2:       col 1, col 2 lit -->
  <rect x="1"  y="1"  width="4" height="4" fill="#ff9922"/>
  <rect x="6"  y="1"  width="4" height="4" fill="#ffcc44"/>
  <rect x="6"  y="6"  width="4" height="4" fill="#ffcc44"/>
  <rect x="6"  y="11" width="4" height="4" fill="#ffcc44"/>
  <rect x="11" y="11" width="4" height="4" fill="#ff9922"/>
</svg>
