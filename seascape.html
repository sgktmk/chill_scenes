<script>
const CYCLE=180,H=85; // horizon y
const BASE_W=320,BASE_H=200;
let g_wxLevel=0; // 0=晴れ…1=大雨（オーディオIIFEから参照）
let g_thunder=0; // 雷トリガーカウンター（増加でオーディオIIFEが雷音再生）

function initResponsive(){
  const svg=document.getElementById('S');
  function adjustViewBox(){
    const w=window.innerWidth,h=window.innerHeight;
    const isPortrait=h>=w;
    if(isPortrait){
      const portraitW=280;
      const extraSky=30;
      const extraGround=10;
      const vbX=(BASE_W-portraitW)/2;
      const vbY=-extraSky;
      const vbH=BASE_H+extraSky+extraGround;

// Color utils
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function r2h(r,g,b){return'#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');}
function lerp(a,b,t){const A=h2r(a),B=h2r(b);return r2h(A[0]+(B[0]-A[0])*t,A[1]+(B[1]-A[1])*t,A[2]+(B[2]-A[2])*t);}

// Phase layout (starts at sunrise):
// 0.00 = sunrise (sun on left horizon)
// 0.05 = sun clearing horizon, golden hour ending
// 0.15 = morning, sky getting blue
// 0.30 = midday, full blue sky
// 0.45 = afternoon
// 0.55 = sun approaching right horizon
// 0.62 = sunset (sun on right horizon)
// 0.70 = dusk, twilight
// 0.78 = night
// 0.92 = deep night
// 0.95 = pre-dawn
// 1.00 = sunrise again
const KF=[0, 0.05, 0.15, 0.30, 0.45, 0.55, 0.62, 0.70, 0.78, 0.95, 1.0];
function interpKF(colors,p){
  if(p>=1)p-=1;
  for(let i=0;i<KF.length-1;i++){
    if(p>=KF[i]&&p<KF[i+1]){return lerp(colors[i],colors[i+1],(p-KF[i])/(KF[i+1]-KF[i]));}
  }
  return colors[colors.length-1];
}

// SUN: left→right arc. Rises from below horizon, crosses at p≈0.02, zenith at p≈0.33, sets at p≈0.64
function sunPos(p){
  if(p>0.70)return null;
  const sp=(p-0.02)/0.62; // sp=0 → horizon, <0 → below
  const x=30+Math.max(0,Math.min(sp,1))*260;
  const y=H-65*Math.sin(sp*Math.PI); // unclamped → naturally goes below horizon
  return{x,y,sp};
}

// MOON: left→right arc (same direction). Rises p≈0.66, zenith p≈0.82, sets p≈0.98
function moonPos(p){
  if(p<0.62)return null;
  // Handle wrap: if p<0.04, treat as p+1 for the tail end of setting
  let pp=p;
  if(pp<0.5)pp+=1; // wrap-safe (moon never visible at p<0.5)
  const mp=(pp-0.66)/0.32; // mp=0 → horizon, 0.5 → zenith, 1 → horizon
  const x=30+Math.max(0,Math.min(mp,1))*260;
  const y=H-50*Math.sin(mp*Math.PI);
  if(y>H+30)return null; // far below, stop
  return{x,y,mp};
}

function nightLevel(p){
  if(p>=0.62&&p<0.78)return (p-0.62)/0.16;
  if(p>=0.78&&p<0.95)return 1;
  if(p>=0.95)return Math.max(0,1-(p-0.95)/0.05);
  if(p<0.05)return Math.max(0,1-p/0.05);
  return 0;
}

function updatePositions(p){
  const nL=nightLevel(p);
  // Sun
  const sp=sunPos(p);
  if(sp){
    sunG.setAttribute('transform',`translate(${sp.x},${sp.y})`);
    sunG.setAttribute('opacity',1);
    // Sun road: intensity based on how low sun is (stronger near horizon)
    const lowness=Math.max(0,(sp.y-30)/(H-30)); // 0 at top, 1 at horizon
    const roadOp=0.3+lowness*0.7;
    srG.setAttribute('opacity',roadOp*Math.max(0,1-g_wxLevel*0.9));
    const rx=sp.x;
    sr[0].setAttribute('x',rx-20);sr[1].setAttribute('x',rx-12);
    sr[2].setAttribute('x',rx-8);sr[3].setAttribute('x',rx-5);
    sr[4].setAttribute('x',rx-18);sr[5].setAttribute('x',rx-22);
  } else {
    sunG.setAttribute('opacity',0);
    srG.setAttribute('opacity',0);
  }

  // Moon
  const mp=moonPos(p);
  if(mp){
    moonI.setAttribute('transform',`translate(${mp.x},${mp.y})`);
    const moonRise=Math.max(0,Math.min(1,mp.mp*3.6));
    const moonVisible=0.06+0.94*nL;
    moonG.setAttribute('opacity',moonRise*moonVisible);
    moonI.setAttribute('filter',nL>0.72?'none':'url(#mF)');
    moonCore.setAttribute('fill',lerp('#e3bfa8','#f6fbff',nL));
    moonShade.setAttribute('fill',lerp('#a79698','#cdd8e5',nL));
    moonCraters.setAttribute('fill',lerp('#9d8f9d','#bdcad8',nL));
    moonHalo.setAttribute('opacity',0.95-(nL*0.5));
    // Moon reflection: faint at rise, clearer in deeper night
    mrG.setAttribute('opacity',0.08+0.5*nL);
    const mx=mp.x;
    mr[0].setAttribute('x',mx-6);mr[1].setAttribute('x',mx-3);
    mr[2].setAttribute('x',mx-1);mr[3].setAttribute('x',mx-1);
  } else {
    moonG.setAttribute('opacity',0);
    mrG.setAttribute('opacity',0);
  }

  // Stars
  let so=0;
  if(p<0.03)so=0.4*(1-p/0.03); // fading at sunrise
  else if(p>=0.62&&p<0.70)so=(p-0.62)/0.08; // appearing at dusk
  else if(p>=0.70&&p<0.95)so=1;
  else if(p>=0.95)so=1-(p-0.95)/0.05*0.6;
  stG.setAttribute('opacity',so);

  // Fishing light
  let fo=0;
  if(p>=0.72&&p<0.76)fo=(p-0.72)/0.04;
  else if(p>=0.76&&p<0.93)fo=1;
  else if(p>=0.93&&p<0.97)fo=1-(p-0.93)/0.04;
  fL.setAttribute('opacity',fo);

  // Birds: daytime
  let bo=0;
  if(p>=0.08&&p<0.12)bo=(p-0.08)/0.04*0.35;
  else if(p>=0.12&&p<0.55)bo=0.35;
  else if(p>=0.55&&p<0.62)bo=0.35*(1-(p-0.55)/0.07);
  bG.setAttribute('opacity',Math.max(0,bo*(1-g_wxLevel)));

  // Horizon glow: strong near sunrise/sunset
  let hOp=0;
  if(sp){
    const nearHorizon=Math.max(0,1-Math.abs(sp.y-H)/20);
    hOp=nearHorizon*0.15;
  }
  hGl.setAttribute('opacity',hOp);
  // Keep the horizon seam merged with the sea color at all times.
  hLn.setAttribute('opacity',1);

  // Cloud opacity（天候時は雲を濃く）
  const isNight=(p>=0.78||p<0.02);
  const baseCloudOp=isNight?0.3:1.0;
  document.getElementById('clG').setAttribute('opacity',Math.min(1.6,baseCloudOp+g_wxLevel*0.6));
}

    const nL=nightLevel(phase());
    const baseDelay=16+Math.random()*36; // daytime baseline: 16-52s
    const nightMul=1+nL*0.85; // reduce spawn probability at night
    return baseDelay*nightMul;

        else if(dt<50)op=startOp;
        else if(dt<150)op=startOp*(1-(dt-50)/100);
        else{flashEl.setAttribute('opacity','0');setTimeout(()=>flash(i+1),60+Math.random()*90);return;}
        flashEl.setAttribute('opacity',op);
        requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    }
    setTimeout(()=>flash(0),delay);
  }

  function tick(now,dt,p){
    trackCycle(p);

    // 強度を目標値に向けてスムーズに追従
    intensity+=(targetIntensity-intensity)*(dt*0.8);
    if(intensity<0.001)intensity=0;
    g_wxLevel=intensity;

    // 霧オーバーレイ
    fogEl.setAttribute('opacity',intensity*0.28);
    wxClouds.setAttribute('opacity',intensity*0.9);

    // 雨粒
    const rainActive=intensity>0.45;
    rainLyr.setAttribute('opacity',rainActive?Math.min(1,(intensity-0.45)/0.55):0);
    if(rainActive){
      if(now-lastDropSpawn>55){
        const count=2+Math.floor(intensity*4);
        for(let i=0;i<count;i++)spawnDrop();
        lastDropSpawn=now;
      }
    }
    for(let i=drops.length-1;i>=0;i--){
      const d=drops[i];
      d.y+=d.spd*dt;
      d.el.setAttribute('y1',d.y);
      d.el.setAttribute('y2',d.y+d.len);
      if(d.y>215){rainLyr.removeChild(d.el);drops.splice(i,1);}
    }

    // 雷フラッシュ（thunderstorm時のみ）
    if(state==='thunderstorm'&&intensity>0.8){
      if(now>=nextLightning)doLightningFlash();
    }
  }

  return{tick};
})();

// ===== MAIN LOOP =====
let lastLoopNow=performance.now();
function loop(){
  const now=performance.now();
  const dt=Math.min((now-lastLoopNow)/1000,0.1);
  lastLoopNow=now;
  const p=phase();
  WX.tick(now,dt,p);
  updateColors(p);
  updatePositions(p);
  requestAnimationFrame(loop);
}
loop();

// ===== DYNAMIC SPARKLES =====
(function(){
  const ns='http://www.w3.org/2000/svg';
  const g=document.getElementById('dG');
  function getBr(p){
    // Bright near sunrise/sunset, moderate midday, faint night
    if(p<0.05)return 0.7;
    if(p<0.15)return 0.7-(p-0.05)/0.1*0.3;
    if(p<0.45)return 0.4;
    if(p<0.55)return 0.4+(p-0.45)/0.1*0.3;
    if(p<0.65)return 0.7;
    if(p<0.78)return 0.7-(p-0.65)/0.13*0.6;
    return 0.05; // faint moon sparkles
  }
  function spark(){
    const p=phase();const br=getBr(p);if(br<0.03)return;
    const sp=sunPos(p),mp=moonPos(p);
    let cx=160;
    if(sp)cx=sp.x; else if(mp)cx=mp.x;
    const el=document.createElementNS(ns,'rect');
    const dist=Math.random()*75;const spread=10+dist*0.45;
    const x=cx+(Math.random()-0.5)*spread*2;const y=87+dist;
    el.setAttribute('x',x);el.setAttribute('y',y);
    el.setAttribute('width',Math.random()>.6?2:1);el.setAttribute('height',1);
    const warm=['#ffee88','#ffffcc','#ffdd66'],cool=['#aabbdd','#bbccee'],day=['#ffffee','#eef8ff','#ddeeff'];
    const cols=(p>=0.78||p<0.02)?cool:(p>=0.15&&p<0.55)?day:warm;
    el.setAttribute('fill',cols[Math.floor(Math.random()*cols.length)]);
    el.setAttribute('opacity','0');g.appendChild(el);
    const dur=300+Math.random()*600,st=performance.now(),maxOp=br*(.3+Math.random()*.7);
    function anim(now){const t=(now-st)/dur;if(t>1){g.removeChild(el);return;}
      el.setAttribute('opacity',Math.max(0,t<.3?(t/.3)*maxOp:t<.5?maxOp:maxOp*(1-(t-.5)/.5)));
      requestAnimationFrame(anim);}
    requestAnimationFrame(anim);
  }
  setInterval(()=>{const c=1+Math.floor(Math.random()*3);for(let i=0;i<c;i++)setTimeout(spark,Math.random()*120);},130);
})();

// ===== AUDIO =====
(function(){
  let ctx=null,master=null,playing=false;
  function init(vol){
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();master.gain.value=vol/100*.7;master.connect(ctx.destination);
    brownNoise();waveSurge(0);waveSurge(2.5);waveSurge(5.5);waveSurge(8.8);foamHiss();deepRumble();wind();seabirds();crickets();rainChannel();thunderSound();
  }
  function mkBuf(len,fn){const b=ctx.createBuffer(1,len,ctx.sampleRate);fn(b.getChannelData(0));return b;}
  function mkBuf2(len,fn){const b=ctx.createBuffer(2,len,ctx.sampleRate);fn(b.getChannelData(0));fn(b.getChannelData(1));return b;}
  function brownNoise(){const buf=mkBuf2(ctx.sampleRate*4,d=>{let v=0;for(let i=0;i<d.length;i++){v=(v+.02*(Math.random()*2-1))/1.02;d[i]=v*3.5;}});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=350;lp.Q.value=.5;const g=ctx.createGain();g.gain.value=.3;function mod(){if(!playing)return;const n=ctx.currentTime;lp.frequency.setValueAtTime(lp.frequency.value,n);lp.frequency.linearRampToValueAtTime(200+Math.random()*350,n+3+Math.random()*5);g.gain.setValueAtTime(g.gain.value,n);g.gain.linearRampToValueAtTime(.15+Math.random()*.3,n+2+Math.random()*4);setTimeout(mod,3e3+Math.random()*5e3);}s.connect(lp);lp.connect(g);g.connect(master);s.start();mod();}
  function waveSurge(delay){const buf=mkBuf(ctx.sampleRate*2,d=>{let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)*.11;b6=w*.115926;}});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=500;bp.Q.value=.7;const g=ctx.createGain();g.gain.value=0;function surge(){if(!playing)return;const n=ctx.currentTime,a=2+Math.random()*2.5,su=.5+Math.random()*1.5,re=3+Math.random()*4,pk=.1+Math.random()*.2;g.gain.setValueAtTime(.015,n);g.gain.linearRampToValueAtTime(pk,n+a);g.gain.setValueAtTime(pk,n+a+su);g.gain.exponentialRampToValueAtTime(.015,n+a+su+re);bp.frequency.setValueAtTime(250,n);bp.frequency.linearRampToValueAtTime(700+Math.random()*500,n+a);bp.frequency.linearRampToValueAtTime(150+Math.random()*200,n+a+su+re);setTimeout(surge,(a+su+re)*1e3+Math.random()*3e3);}s.connect(bp);bp.connect(g);g.connect(master);s.start();setTimeout(surge,delay*1e3);}
  function foamHiss(){const buf=mkBuf(ctx.sampleRate*2,d=>{for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=3e3;hp.Q.value=.3;const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=8e3;lp.Q.value=.5;const g=ctx.createGain();g.gain.value=.02;function mod(){if(!playing)return;const n=ctx.currentTime,t=1.5+Math.random()*4;g.gain.setValueAtTime(g.gain.value,n);g.gain.linearRampToValueAtTime(.008+Math.random()*.05,n+t);hp.frequency.setValueAtTime(hp.frequency.value,n);hp.frequency.linearRampToValueAtTime(2e3+Math.random()*4e3,n+t);setTimeout(mod,t*1e3);}s.connect(hp);hp.connect(lp);lp.connect(g);g.connect(master);s.start();mod();}
  function deepRumble(){const buf=mkBuf(ctx.sampleRate*4,d=>{let v=0;for(let i=0;i<d.length;i++){v=(v+.005*(Math.random()*2-1))/1.005;d[i]=v*8;}});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=80;lp.Q.value=.8;const g=ctx.createGain();g.gain.value=.15;function mod(){if(!playing)return;const n=ctx.currentTime,t=5+Math.random()*8;g.gain.setValueAtTime(g.gain.value,n);g.gain.linearRampToValueAtTime(.08+Math.random()*.15,n+t);lp.frequency.setValueAtTime(lp.frequency.value,n);lp.frequency.linearRampToValueAtTime(50+Math.random()*80,n+t);setTimeout(mod,t*1e3);}s.connect(lp);lp.connect(g);g.connect(master);s.start();mod();}
  function wind(){const buf=mkBuf2(ctx.sampleRate*4,d=>{let v=0;for(let i=0;i<d.length;i++){v=(v+.004*(Math.random()*2-1))/1.004;d[i]=v*5;}});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=400;bp.Q.value=1.2;const g=ctx.createGain();g.gain.value=.04;function mod(){if(!playing)return;const n=ctx.currentTime,t=5+Math.random()*10;bp.frequency.setValueAtTime(bp.frequency.value,n);bp.frequency.linearRampToValueAtTime(150+Math.random()*700,n+t);g.gain.setValueAtTime(g.gain.value,n);g.gain.linearRampToValueAtTime(.015+Math.random()*.06,n+t);setTimeout(mod,t*1e3);}s.connect(bp);bp.connect(g);g.connect(master);s.start();mod();}
  function seabirds(){function call(){if(!playing)return;const p=phase();if(p>.70||p<.05){setTimeout(call,5e3+Math.random()*15e3);return;}const n=ctx.currentTime,f=1800+Math.random()*1800;const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,n);o.frequency.linearRampToValueAtTime(f*1.3,n+.1);o.frequency.linearRampToValueAtTime(f*.7,n+.35);o.frequency.linearRampToValueAtTime(f*1.1,n+.45);o.frequency.linearRampToValueAtTime(f*.5,n+.65);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.015,n+.05);g.gain.exponentialRampToValueAtTime(.001,n+.65);o.connect(g);g.connect(master);o.start(n);o.stop(n+.7);if(Math.random()>.5){setTimeout(()=>{if(!playing)return;const o2=ctx.createOscillator(),g2=ctx.createGain(),n2=ctx.currentTime;o2.type='sine';o2.frequency.setValueAtTime(f*.85,n2);o2.frequency.linearRampToValueAtTime(f*1.15,n2+.15);o2.frequency.linearRampToValueAtTime(f*.6,n2+.4);g2.gain.setValueAtTime(0,n2);g2.gain.linearRampToValueAtTime(.01,n2+.05);g2.gain.exponentialRampToValueAtTime(.001,n2+.45);o2.connect(g2);g2.connect(master);o2.start(n2);o2.stop(n2+.5);},300+Math.random()*400);}setTimeout(call,8e3+Math.random()*2e4);}setTimeout(call,2e3+Math.random()*5e3);}
  function crickets(){function chirp(){if(!playing)return;const p=phase();if(p<.72||p>.97){setTimeout(chirp,3e3+Math.random()*5e3);return;}const n=ctx.currentTime;for(let i=0;i<3+Math.floor(Math.random()*4);i++){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=4200+Math.random()*1200;const t=n+i*.08;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.008+Math.random()*.006,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.05);o.connect(g);g.connect(master);o.start(t);o.stop(t+.06);}setTimeout(chirp,1500+Math.random()*6e3);}setTimeout(chirp,4e3+Math.random()*6e3);}
  function rainChannel(){const buf=mkBuf2(ctx.sampleRate*4,d=>{for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;});const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800;hp.Q.value=0.4;const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=6000;lp.Q.value=0.5;const g=ctx.createGain();g.gain.value=0;s.connect(hp);hp.connect(lp);lp.connect(g);g.connect(master);s.start();function mod(){if(!playing)return;const n=ctx.currentTime,target=g_wxLevel*0.12;g.gain.setValueAtTime(g.gain.value,n);g.gain.linearRampToValueAtTime(target,n+0.6);setTimeout(mod,600);}mod();}
  function thunderSound(){let lastThunder=g_thunder;function poll(){if(!playing){setTimeout(poll,500);return;}if(g_thunder!==lastThunder){lastThunder=g_thunder;const n=ctx.currentTime;// 低周波オシレーター複数で轟音
    const freqs=[45,58,72,90];freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g2=ctx.createGain();o.type='sine';o.frequency.value=f+Math.random()*10;const t=n+i*0.05;g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.04+Math.random()*0.04,t+0.1);g2.gain.exponentialRampToValueAtTime(0.001,t+3+Math.random()*2);o.connect(g2);g2.connect(master);o.start(t);o.stop(t+5);});// ブラウンノイズバースト
    const bBuf=mkBuf(ctx.sampleRate*5,d=>{let v=0;for(let i=0;i<d.length;i++){v=(v+.01*(Math.random()*2-1))/1.01;d[i]=v*6;}});const bs=ctx.createBufferSource();bs.buffer=bBuf;const blp=ctx.createBiquadFilter();blp.type='lowpass';blp.frequency.value=120;const bg=ctx.createGain();bg.gain.setValueAtTime(0,n);bg.gain.linearRampToValueAtTime(0.18+Math.random()*0.1,n+0.08);bg.gain.exponentialRampToValueAtTime(0.001,n+4+Math.random()*2);bs.connect(blp);blp.connect(bg);bg.connect(master);bs.start(n);bs.stop(n+6);}setTimeout(poll,500);}setTimeout(poll,1000);}
  initSceneAudio({
    onStart(v){if(!ctx)init(v);else if(ctx.state==='suspended')ctx.resume();playing=true;master.gain.setValueAtTime(0,ctx.currentTime);master.gain.linearRampToValueAtTime(v/100*.7,ctx.currentTime+.5);},
    onStop(){playing=false;if(ctx&&ctx.state==='running'){master.gain.setValueAtTime(master.gain.value,ctx.currentTime);master.gain.linearRampToValueAtTime(0,ctx.currentTime+.5);setTimeout(()=>{if(!playing)ctx.suspend();},600);}},
    onVolumeChange(v){if(ctx&&master&&playing){master.gain.setValueAtTime(master.gain.value,ctx.currentTime);master.gain.linearRampToValueAtTime(v/100*.7,ctx.currentTime+.1);}}
  });
})();
