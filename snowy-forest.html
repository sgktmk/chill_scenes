<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜の雪の森 — Chill Scenes</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="/shared/scene-ui.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e}
body{display:flex;align-items:center;justify-content:center;font-family:monospace;color:#ccd}

#scene-wrap{
  position:relative;
  width:100vw;height:56.25vw;
  max-height:100vh;max-width:177.78vh;
  overflow:hidden;cursor:default;
}
#scene-wrap svg,.snow-svg{
  display:block;width:100%;height:100%;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
}
svg rect{shape-rendering:crispEdges}
.snow-svg{position:absolute;top:0;left:0;pointer-events:none}

/* Snow fall */
@keyframes snowA{0%{transform:translateY(-14px) translateX(0)}100%{transform:translateY(196px) translateX(7px)}}
@keyframes snowB{0%{transform:translateY(-14px) translateX(0)}100%{transform:translateY(196px) translateX(-5px)}}
@keyframes snowC{0%{transform:translateY(-10px) translateX(0)}100%{transform:translateY(196px) translateX(3px)}}

@media(prefers-reduced-motion:reduce){
  .snow-dot{animation:none!important}
}
</style>
</head>
<body>
<a class="back" href="/">&#8592; Top</a>
<div id="scene-wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div class="ap">
  <button class="ab" id="aBtn"><span style="position:relative">🔇<span class="wi"><span></span><span></span><span></span></span></span></button>
  <input type="range" class="vs" id="vSl" min="0" max="100" value="30"/>
  <span class="vl" id="vLb">30%</span>
</div>

<script>
/* ===========================================================
   CONFIG
   =========================================================== */
const W = 320, H = 180;
const SNOW_FAR = 55, SNOW_NEAR = 30, SNOW_SPEED = 9;

/* 32-colour palette */
const P = [
  '#060610', // 0  void
  '#0a0e1c', // 1  deep sky
  '#101828', // 2  dark sky
  '#162038', // 3  sky mid-dark
  '#1c3050', // 4  sky mid
  '#264068', // 5  sky blue
  '#305080', // 6  sky lighter
  '#3c6090', // 7  distant blue
  '#5878a0', // 8  snow deep shadow
  '#7898b8', // 9  snow shadow
  '#98b8d0', // 10 snow mid
  '#b0cce0', // 11 snow light
  '#c8dce8', // 12 snow bright
  '#e0ecf0', // 13 snow white
  '#f0f4f0', // 14 pure white
  '#0a1418', // 15 tree darkest
  '#0e1c22', // 16 tree very dark
  '#142428', // 17 tree dark
  '#1c3030', // 18 tree mid-dark
  '#243838', // 19 tree mid
  '#304840', // 20 tree light
  '#e0d8b0', // 21 moon warm
  '#f0eccc', // 22 moon bright
  '#f8f4e0', // 23 moon white
  '#d0c898', // 24 moon shadow
  '#b8b888', // 25 moon halo inner
  '#384858', // 26 blue-grey
  '#485868', // 27 mid grey-blue
  '#586878', // 28 light grey-blue
  '#c0d0a0', // 29 aurora hint (unused reserve)
  '#283040', // 30 dark blue-grey
  '#e8e0c8', // 31 warm highlight
];

/* ===========================================================
   PIXEL BUFFER
   =========================================================== */
const buf = new Uint8Array(W * H);
let _s = 77;
function sr(v) { _s = v; }
function rn() { _s = (_s * 1103515245 + 12345) & 0x7fffffff; return _s / 0x7fffffff; }
function ri(a, b) { return Math.floor(a + rn() * (b - a + 1)); }
function sp(x, y, c) { x = Math.round(x); y = Math.round(y); if (x >= 0 && x < W && y >= 0 && y < H) buf[y * W + x] = c; }
function fr(x0, y0, w, h, c) { for (let y = y0; y < y0 + h; y++) for (let x = x0; x < x0 + w; x++) sp(x, y, c); }
function fe(cx, cy, rx, ry, c) {
  for (let y = cy - ry; y <= cy + ry; y++) {
    let dy = (y - cy) / ry, dx = Math.sqrt(Math.max(0, 1 - dy * dy)) * rx;
    for (let x = Math.round(cx - dx); x <= Math.round(cx + dx); x++) sp(x, y, c);
  }
}
function ft(x0, y0, x1, y1, x2, y2, c) {
  let pts = [{ x: x0, y: y0 }, { x: x1, y: y1 }, { x: x2, y: y2 }].sort((a, b) => a.y - b.y);
  let [A, B, C] = pts;
  for (let y = A.y; y <= C.y; y++) {
    let xa, xb;
    if (y < B.y) { xa = A.x + (B.x - A.x) * (y - A.y) / (B.y - A.y || 1); xb = A.x + (C.x - A.x) * (y - A.y) / (C.y - A.y || 1); }
    else { xa = B.x + (C.x - B.x) * (y - B.y) / (C.y - B.y || 1); xb = A.x + (C.x - A.x) * (y - A.y) / (C.y - A.y || 1); }
    if (xa > xb)[xa, xb] = [xb, xa];
    for (let x = Math.floor(xa); x <= Math.ceil(xb); x++) sp(x, y, c);
  }
}

/* ===========================================================
   TREE DRAWING — layered conifers with snow
   =========================================================== */
function drawTree(cx, baseY, h, w, depth) {
  // depth: 0=far, 1=mid, 2=near
  let darkC, midC, lightC;
  if (depth === 0) { darkC = 4; midC = 5; lightC = 6; }
  else if (depth === 1) { darkC = 16; midC = 17; lightC = 18; }
  else { darkC = 15; midC = 16; lightC = 17; }

  // Trunk
  let tw = Math.max(2, Math.floor(w * 0.07));
  let th = Math.floor(h * 0.1);
  fr(cx - Math.floor(tw / 2), baseY - th, tw, th + 2, depth === 0 ? 4 : 15);

  // Tiers
  let tiers = depth === 0 ? 3 : (depth === 1 ? 4 : 5);
  for (let t = 0; t < tiers; t++) {
    let tierH = Math.floor(h / tiers) + (depth === 2 ? 5 : 4);
    let tierY = baseY - th - t * Math.floor(h / tiers);
    let tierW = Math.floor(w * (1 - t * 0.14));

    // Body
    ft(cx, tierY - tierH, cx - tierW / 2, tierY + 3, cx + tierW / 2, tierY + 3, darkC);
    ft(cx, tierY - tierH + 2, cx - tierW / 2 + 3, tierY + 1, cx + tierW / 2 - 3, tierY + 1, midC);

    // Inner detail
    for (let s = 0; s < 2; s++) {
      let px = cx + ri(-tierW / 3, tierW / 3);
      let py = tierY - ri(1, tierH / 2);
      sp(px, py, lightC); sp(px + 1, py, lightC);
    }

    // Snow on tier
    let snowThick = depth === 0 ? 2 : (depth === 1 ? 3 : 4);
    for (let x = Math.floor(cx - tierW / 2 + 2); x <= Math.floor(cx + tierW / 2 - 2); x++) {
      let t_ratio = Math.abs(x - cx) / (tierW / 2);
      if (t_ratio > 1) continue;
      let topY = Math.floor(tierY - tierH + tierH * t_ratio);
      let sT = Math.max(1, Math.floor(snowThick * (0.4 + t_ratio * 0.8)));
      for (let dy = 0; dy < sT; dy++) {
        let sc = dy === 0 ? 14 : (dy === 1 ? 13 : (dy === 2 ? 12 : 11));
        if (depth === 0) sc = Math.max(10, sc - 2); // dimmer for distant
        sp(x, topY + dy, sc);
      }
    }

    // Snow drapes at tier edges
    let edgeL = Math.floor(cx - tierW / 2);
    let edgeR = Math.floor(cx + tierW / 2);
    for (let dy = 0; dy < (depth === 2 ? 4 : 2); dy++) {
      for (let dx = 0; dx < 3 - dy; dx++) {
        let sc = dy === 0 ? 14 : (dy === 1 ? 12 : 11);
        if (depth === 0) sc = Math.max(10, sc - 2);
        sp(edgeL + dx, tierY + dy, sc);
        sp(edgeR - dx, tierY + dy, sc);
      }
    }
  }
}

/* ===========================================================
   MOON — drawn to buffer, positions recorded for animation
   =========================================================== */
const MOON_CX = 220, MOON_CY = 35, MOON_R = 14;
const moonPixels = []; // {x,y,c} for shimmer animation
const moonHaloPixels = [];

function drawMoon() {
  // Halo glow (outer ring of scattered dots)
  for (let i = 0; i < 80; i++) {
    let a = rn() * 6.2832;
    let r = MOON_R + 2 + rn() * 10;
    let x = Math.round(MOON_CX + Math.cos(a) * r);
    let y = Math.round(MOON_CY + Math.sin(a) * r);
    if (x >= 0 && x < W && y >= 0 && y < H) {
      let c = r < MOON_R + 5 ? 25 : (r < MOON_R + 8 ? 6 : 5);
      sp(x, y, c);
      moonHaloPixels.push({ x, y, baseC: c });
    }
  }

  // Moon body — layered ellipses
  fe(MOON_CX, MOON_CY, MOON_R, MOON_R, 24);       // shadow layer
  fe(MOON_CX, MOON_CY, MOON_R - 1, MOON_R - 1, 21); // warm base
  fe(MOON_CX, MOON_CY, MOON_R - 3, MOON_R - 3, 22); // bright mid
  fe(MOON_CX, MOON_CY, MOON_R - 5, MOON_R - 5, 23); // white centre

  // Crater details
  fe(MOON_CX - 4, MOON_CY - 3, 3, 2, 24);
  fe(MOON_CX + 3, MOON_CY + 2, 2, 2, 24);
  fe(MOON_CX - 1, MOON_CY + 4, 2, 1, 24);
  fe(MOON_CX + 5, MOON_CY - 2, 1, 1, 21);

  // Record all moon pixels
  for (let y = MOON_CY - MOON_R - 1; y <= MOON_CY + MOON_R + 1; y++) {
    for (let x = MOON_CX - MOON_R - 1; x <= MOON_CX + MOON_R + 1; x++) {
      if (x < 0 || x >= W || y < 0 || y >= H) continue;
      let c = buf[y * W + x];
      if (c >= 21 && c <= 25) {
        moonPixels.push({ x, y, baseC: c });
      }
    }
  }
}

/* ===========================================================
   STARS — positions recorded for twinkling
   =========================================================== */
const stars = []; // {x, y, c, size, twinkleSpeed}

function drawStars() {
  for (let i = 0; i < 70; i++) {
    let sx = ri(2, W - 2), sy = ri(2, 72);
    // Avoid moon
    if (Math.hypot(sx - MOON_CX, sy - MOON_CY) < MOON_R + 12) continue;
    let c = rn() < 0.2 ? 14 : (rn() < 0.4 ? 13 : (rn() < 0.6 ? 12 : 11));
    let size = rn() < 0.15 ? 2 : 1; // most stars 1px, a few 2px
    let isCross = rn() < 0.12; // bright cross-shaped stars

    sp(sx, sy, c);
    if (size === 2) { sp(sx + 1, sy, c); sp(sx, sy + 1, c); sp(sx + 1, sy + 1, c); }
    if (isCross) {
      sp(sx + 1, sy, Math.max(9, c - 2));
      sp(sx - 1, sy, Math.max(9, c - 2));
      sp(sx, sy + 1, Math.max(9, c - 2));
      sp(sx, sy - 1, Math.max(9, c - 2));
    }

    stars.push({
      x: sx, y: sy, baseC: c, size,
      cross: isCross,
      speed: 1.5 + rn() * 4, // twinkle period in seconds
      phase: rn() * 6.28,
    });
  }
}

/* ===========================================================
   PAINT SCENE
   =========================================================== */
function paintScene() {
  sr(98765);
  buf.fill(0);

  // ---- SKY ----
  for (let y = 0; y < H; y++) {
    let c;
    if (y < 8) c = 0;
    else if (y < 18) c = 1;
    else if (y < 30) c = 2;
    else if (y < 44) c = 3;
    else if (y < 58) c = 4;
    else if (y < 72) c = 5;
    else if (y < 84) c = 4;
    else c = 5;
    for (let x = 0; x < W; x++) sp(x, y, c);
  }

  drawStars();
  drawMoon();

  // ---- DISTANT MOUNTAINS ----
  for (let x = 0; x < W; x++) {
    let mh = 74 + Math.sin(x * 0.012) * 16 + Math.sin(x * 0.035) * 10 + Math.sin(x * 0.08) * 5;
    for (let y = Math.floor(mh); y < 110; y++) {
      let d = y - mh;
      let c = d < 3 ? 4 : (d < 6 ? 5 : (d < 12 ? 30 : 26));
      sp(x, y, c);
    }
  }

  // ---- FAR TREES (depth 0) ----
  for (let i = 0; i < 30; i++) {
    let tx = ri(-10, W + 10);
    let tby = ri(82, 100);
    drawTree(tx, tby, ri(10, 20), ri(12, 22), 0);
  }

  // ---- GROUND SNOW ----
  for (let x = 0; x < W; x++) {
    let gh = 105 + Math.sin(x * 0.018) * 6 + Math.sin(x * 0.05) * 4 + Math.sin(x * 0.12) * 2;
    for (let y = Math.floor(gh); y < H; y++) {
      let d = y - gh;
      let c;
      if (d < 1) c = 14;
      else if (d < 3) c = 13;
      else if (d < 6) c = 12;
      else if (d < 10) c = 11;
      else if (d < 18) c = 10;
      else if (d < 30) c = 9;
      else if (d < 50) c = 8;
      else c = 26;
      if (rn() < 0.04) c = Math.max(8, c - 1);
      if (rn() < 0.03) c = Math.min(14, c + 1);
      sp(x, y, c);
    }
  }

  // Moon reflection on snow — subtle bright patches
  for (let y = 108; y < 135; y++) {
    let spread = (y - 108) * 1.5;
    for (let x = Math.floor(MOON_CX - 12 - spread); x < Math.floor(MOON_CX + 12 + spread); x++) {
      if (x < 0 || x >= W || y >= H) continue;
      let cur = buf[y * W + x];
      let intensity = 1 - (y - 108) / 27;
      if (cur >= 9 && cur <= 13 && rn() < 0.15 * intensity) {
        sp(x, y, Math.min(14, cur + 1));
      }
    }
  }

  // Snow texture
  for (let i = 0; i < 500; i++) {
    let x = ri(0, W - 1), y = ri(108, H - 1);
    let cur = buf[y * W + x];
    if (cur >= 8 && cur <= 13) sp(x, y, rn() < 0.5 ? Math.max(8, cur - 1) : Math.min(14, cur + 1));
  }

  // Snow drifts — gentle undulation with blue shadows
  for (let i = 0; i < 12; i++) {
    let driftX = ri(20, W - 20);
    let driftY = ri(115, H - 15);
    let driftW = ri(15, 40);
    for (let dx = 0; dx < driftW; dx++) {
      let dh = Math.floor(Math.sin(dx / driftW * 3.14) * 3);
      for (let dy = 0; dy < dh; dy++) {
        let sc = dy === 0 ? 13 : 12;
        sp(driftX + dx, driftY - dy, sc);
      }
      // Shadow behind drift
      sp(driftX + dx, driftY + 1, 9);
    }
  }

  // ---- MID TREES (depth 1) ----
  for (let i = 0; i < 20; i++) {
    let tx = ri(-10, W + 10);
    let tby = ri(100, 118);
    drawTree(tx, tby, ri(18, 32), ri(20, 32), 1);
  }

  // ---- Small clearing in centre with a few animal tracks ----
  for (let i = 0; i < 12; i++) {
    let fx = 140 + i * 6 + ri(-2, 2);
    let fy = 130 + Math.sin(i * 0.6) * 5 + ri(-1, 1);
    sp(fx, fy, 9); sp(fx + 1, fy, 9);
    if (rn() < 0.5) sp(fx, fy + 1, 10);
  }

  // ---- FOREGROUND TREES (depth 2) — large, framing ----
  // Left cluster
  drawTree(10, 125, 50, 52, 2);
  drawTree(45, 122, 48, 50, 2);
  drawTree(-12, 130, 40, 44, 2);
  drawTree(30, 132, 30, 34, 2);
  drawTree(70, 124, 42, 44, 2);
  drawTree(55, 134, 25, 28, 2);

  // Right cluster
  drawTree(310, 125, 50, 52, 2);
  drawTree(275, 122, 48, 50, 2);
  drawTree(332, 130, 40, 44, 2);
  drawTree(290, 132, 30, 34, 2);
  drawTree(250, 124, 42, 44, 2);
  drawTree(265, 134, 25, 28, 2);

  // A couple near centre-back to fill depth
  drawTree(130, 112, 28, 30, 1);
  drawTree(195, 114, 26, 28, 1);
  drawTree(160, 116, 22, 24, 1);
}

/* ===========================================================
   SVG RENDER
   =========================================================== */
function render() {
  let mainRects = '';
  let moonRects = '';
  let starRects = '';

  const moonSet = new Set(moonPixels.map(p => p.y * W + p.x));
  const haloSet = new Set(moonHaloPixels.map(p => p.y * W + p.x));
  const starPositions = new Set();
  for (let s of stars) {
    starPositions.add(s.y * W + s.x);
    if (s.size === 2) { starPositions.add(s.y * W + s.x + 1); starPositions.add((s.y + 1) * W + s.x); starPositions.add((s.y + 1) * W + s.x + 1); }
    if (s.cross) { starPositions.add(s.y * W + s.x + 1); starPositions.add(s.y * W + s.x - 1); starPositions.add((s.y + 1) * W + s.x); starPositions.add((s.y - 1) * W + s.x); }
  }

  for (let y = 0; y < H; y++) {
    let x = 0;
    while (x < W) {
      let c = buf[y * W + x], run = 1;
      while (x + run < W && buf[y * W + x + run] === c) run++;
      let r = '<rect x="' + x + '" y="' + y + '" width="' + run + '" height="1" fill="' + P[c] + '"/>';

      let isMoon = false, isStar = false;
      for (let wx = x; wx < x + run; wx++) {
        let k = y * W + wx;
        if (moonSet.has(k) || haloSet.has(k)) { isMoon = true; break; }
      }
      if (!isMoon && run <= 5) {
        for (let wx = x; wx < x + run; wx++) {
          if (starPositions.has(y * W + wx)) { isStar = true; break; }
        }
      }

      if (isMoon) moonRects += r;
      else if (isStar) starRects += r;
      else mainRects += r;
      x += run;
    }
  }

  document.getElementById('svg').innerHTML =
    '<g>' + mainRects + '</g>' +
    '<g id="moon-g">' + moonRects + '</g>' +
    '<g id="stars-g">' + starRects + '</g>';
}

/* ===========================================================
   ANIMATIONS — Moon shimmer + Star twinkle (JS-driven)
   =========================================================== */
let animFrame;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function startAnimations() {
  if (reducedMotion) return;

  const moonG = document.getElementById('moon-g');
  const starsG = document.getElementById('stars-g');

  let t0 = performance.now();
  function tick(now) {
    let t = (now - t0) / 1000;

    // Moon shimmer — slow layered sine waves
    let moonBright = 1.0 + Math.sin(t * 0.4) * 0.06 + Math.sin(t * 0.7 + 1) * 0.04 + Math.sin(t * 1.3 + 2) * 0.03;
    if (moonG) moonG.style.filter = 'brightness(' + moonBright.toFixed(3) + ')';

    // Stars — varied twinkling via per-star rect updates
    let starSvg = '';
    for (let s of stars) {
      let phase = t / s.speed + s.phase;
      let brightness = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(phase * 6.2832));
      if (s.cross) brightness = 0.2 + 0.8 * (0.5 + 0.5 * Math.sin(phase * 6.2832));

      let c = s.baseC;
      let dispC;
      if (brightness > 0.8) dispC = P[c];
      else if (brightness > 0.5) dispC = P[Math.max(9, c - 1)];
      else if (brightness > 0.3) dispC = P[Math.max(8, c - 2)];
      else dispC = P[Math.max(5, c - 4)];

      let op = Math.max(0.15, brightness).toFixed(2);

      starSvg += '<rect x="' + s.x + '" y="' + s.y + '" width="1" height="1" fill="' + dispC + '" opacity="' + op + '"/>';
      if (s.size === 2) {
        starSvg += '<rect x="' + (s.x + 1) + '" y="' + s.y + '" width="1" height="1" fill="' + dispC + '" opacity="' + op + '"/>';
        starSvg += '<rect x="' + s.x + '" y="' + (s.y + 1) + '" width="1" height="1" fill="' + dispC + '" opacity="' + op + '"/>';
      }
      if (s.cross && brightness > 0.6) {
        let armOp = ((brightness - 0.6) * 2).toFixed(2);
        let armC = P[Math.max(9, c - 2)];
        starSvg += '<rect x="' + (s.x + 1) + '" y="' + s.y + '" width="1" height="1" fill="' + armC + '" opacity="' + armOp + '"/>';
        starSvg += '<rect x="' + (s.x - 1) + '" y="' + s.y + '" width="1" height="1" fill="' + armC + '" opacity="' + armOp + '"/>';
        starSvg += '<rect x="' + s.x + '" y="' + (s.y + 1) + '" width="1" height="1" fill="' + armC + '" opacity="' + armOp + '"/>';
        starSvg += '<rect x="' + s.x + '" y="' + (s.y - 1) + '" width="1" height="1" fill="' + armC + '" opacity="' + armOp + '"/>';
      }
    }
    if (starsG) starsG.innerHTML = starSvg;

    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

/* ===========================================================
   SNOW OVERLAY
   =========================================================== */
function mkSnow() {
  const wrap = document.getElementById('scene-wrap');
  function layer(n, szMin, szMax, spMin, spMax, op) {
    const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    s.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    s.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    s.classList.add('snow-svg');
    let h = '';
    for (let i = 0; i < n; i++) {
      let x = Math.random() * W, y = Math.random() * H;
      let sz = Math.floor(szMin + Math.random() * (szMax - szMin + 1));
      let dur = (spMin + Math.random() * (spMax - spMin)).toFixed(1);
      let del = (Math.random() * spMax).toFixed(1);
      let an = ['snowA', 'snowB', 'snowC'][Math.floor(Math.random() * 3)];
      let o = (op - Math.random() * .15).toFixed(2);
      let cl = Math.random() < .3 ? P[14] : (Math.random() < .5 ? P[13] : P[12]);
      h += '<rect class="snow-dot" x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + sz + '" height="' + sz + '" fill="' + cl + '" opacity="' + o + '" style="animation:' + an + ' ' + dur + 's linear -' + del + 's infinite"/>';
    }
    s.innerHTML = h;
    wrap.appendChild(s);
  }
  // Far layer: many small slow flakes
  layer(SNOW_FAR, 1, 1, SNOW_SPEED * 1.1, SNOW_SPEED * 1.8, 0.35);
  // Near layer: fewer larger faster flakes
  layer(SNOW_NEAR, 1, 2, SNOW_SPEED * 0.6, SNOW_SPEED * 1.0, 0.65);
}

/* ===========================================================
   AUDIO — Winter Forest Ambience
   =========================================================== */
let audioCtx = null, masterGain = null;
let owlTimer = null, windTimer = null;

function makeNoiseSrc(ac) {
  const sz = ac.sampleRate * 2;
  const abuf = ac.createBuffer(1, sz, ac.sampleRate);
  const d = abuf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = abuf;
  src.loop = true;
  return src;
}

function startAudio(vol) {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(vol / 100 * 0.45, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);

  // ---- Wind: low howl ----
  const wSrc = makeNoiseSrc(audioCtx);
  const wFilt = audioCtx.createBiquadFilter();
  wFilt.type = 'bandpass';
  wFilt.frequency.value = 320;
  wFilt.Q.value = 0.8;
  const wGain = audioCtx.createGain();
  wGain.gain.value = 0.28;
  wSrc.connect(wFilt);
  wFilt.connect(wGain);
  wGain.connect(masterGain);
  wSrc.start();

  // Wind gust modulation — slowly sweeps frequency and volume
  (function gust() {
    const t = audioCtx.currentTime;
    const freq = 180 + Math.random() * 480;
    const amp  = 0.12 + Math.random() * 0.28;
    const dur  = 3.5 + Math.random() * 5.5;
    wFilt.frequency.linearRampToValueAtTime(freq, t + dur);
    wGain.gain.linearRampToValueAtTime(amp, t + dur);
    windTimer = setTimeout(gust, Math.round(dur * 800));
  })();

  // ---- Wind: high-frequency whisper through branches ----
  const wsSrc = makeNoiseSrc(audioCtx);
  const wsFilt = audioCtx.createBiquadFilter();
  wsFilt.type = 'highpass';
  wsFilt.frequency.value = 3200;
  const wsGain = audioCtx.createGain();
  wsGain.gain.value = 0.038;
  wsSrc.connect(wsFilt);
  wsFilt.connect(wsGain);
  wsGain.connect(masterGain);
  wsSrc.start();

  // ---- Deep cold drone ----
  const drone = audioCtx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 48;
  const droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.035;
  drone.connect(droneGain);
  droneGain.connect(masterGain);
  drone.start();

  // ---- Occasional owl hoot ----
  scheduleOwl();
}

function scheduleOwl() {
  owlTimer = setTimeout(() => {
    if (!audioCtx) return;
    if (Math.random() < 0.75) playOwl();
    scheduleOwl();
  }, 10000 + Math.random() * 20000);
}

function playOwl() {
  const ac = audioCtx, t = ac.currentTime;
  function hoot(f0, f1, start, dur, amp) {
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f0, start);
    osc.frequency.exponentialRampToValueAtTime(f1, start + dur * 0.75);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(amp, start + 0.07);
    g.gain.setValueAtTime(amp * 0.85, start + dur * 0.6);
    g.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  }
  hoot(345, 280, t,       0.70, 0.10);
  hoot(400, 330, t + 1.1, 0.60, 0.08);
}

function stopAudio() {
  clearTimeout(owlTimer);
  clearTimeout(windTimer);
  owlTimer = null; windTimer = null;
  if (audioCtx) { audioCtx.close(); audioCtx = null; masterGain = null; }
}

function setVolume(v) {
  if (masterGain) masterGain.gain.setValueAtTime(v / 100 * 0.45, audioCtx.currentTime);
}

/* ===========================================================
   INIT
   =========================================================== */
paintScene();
render();
startAnimations();
mkSnow();
</script>
<script src="/shared/scene-ui.js"></script>
<script>
initSceneAudio({
  onStart(v)        { startAudio(v); },
  onStop()          { stopAudio(); },
  onVolumeChange(v) { setVolume(v); },
});
</script>
