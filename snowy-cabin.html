<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050b18;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .scene-container {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-width: 100vw;
    max-height: 100vh;
  }
  @media (min-aspect-ratio: 16/9) {
    .scene-container {
      height: 100vh;
      width: 177.78vh;
    }
  }
  svg { width: 100%; height: 100%; image-rendering: pixelated; }
  /* ===== STAR TWINKLE ===== */
  @keyframes twinkle1 { 0%,100%{opacity:.3}50%{opacity:1} }
  @keyframes twinkle2 { 0%,100%{opacity:.5}50%{opacity:.1} }
  @keyframes twinkle3 { 0%,100%{opacity:.7}50%{opacity:.2} }
  .star-t1 { animation: twinkle1 3s ease-in-out infinite; }
  .star-t2 { animation: twinkle2 4s ease-in-out infinite 1s; }
  .star-t3 { animation: twinkle3 5s ease-in-out infinite 2s; }
  .star-t4 { animation: twinkle1 3.5s ease-in-out infinite 0.5s; }
  .star-t5 { animation: twinkle2 4.5s ease-in-out infinite 1.5s; }
  .star-t6 { animation: twinkle3 2.8s ease-in-out infinite 0.8s; }
  /* ===== WINDOW GLOW ===== */
  @keyframes winFlicker {
    0%,100%{opacity:.55} 20%{opacity:.72} 40%{opacity:.48} 60%{opacity:.68} 80%{opacity:.44}
  }
  .win-glow   { animation: winFlicker 5.0s ease-in-out infinite; }
  .win-glow-2 { animation: winFlicker 5.0s ease-in-out infinite 1.3s; }
  /* ===== SMOKE ===== */
  @keyframes smoke1 {
    0%  {transform:translate(0,0) scaleX(1);opacity:.4}
    30% {transform:translate(-4px,-28px) scaleX(1.3);opacity:.28}
    60% {transform:translate(-8px,-55px) scaleX(1.7);opacity:.14}
    100%{transform:translate(-5px,-95px) scaleX(2.2);opacity:0}
  }
  @keyframes smoke2 {
    0%  {transform:translate(0,0) scaleX(1);opacity:.35}
    30% {transform:translate(3px,-24px) scaleX(1.4);opacity:.24}
    60% {transform:translate(7px,-50px) scaleX(1.8);opacity:.12}
    100%{transform:translate(10px,-88px) scaleX(2.5);opacity:0}
  }
  @keyframes smoke3 {
    0%  {transform:translate(0,0) scaleX(1);opacity:.3}
    30% {transform:translate(-2px,-32px) scaleX(1.2);opacity:.20}
    60% {transform:translate(4px,-62px) scaleX(1.5);opacity:.10}
    100%{transform:translate(2px,-102px) scaleX(2.0);opacity:0}
  }
  .smoke1 { animation: smoke1 5.2s ease-out infinite; }
  .smoke2 { animation: smoke2 5.9s ease-out infinite 1.8s; }
  .smoke3 { animation: smoke3 4.8s ease-out infinite 3.4s; }
</style>

<script>
  // ========================================
  // SHOOTING STARS
  // ========================================
  (function initShootingStars() {
    const svgNS = "http://www.w3.org/2000/svg";
    const container = document.getElementById('shootingStars');
    function spawnShootingStar() {
      const x = 20 + Math.random() * 370;
      const y = 3  + Math.random() * 58;
      const len = 14 + Math.random() * 22;
      const angle = 18 + Math.random() * 28;
      const rad = angle * Math.PI / 180;
      const dx = Math.cos(rad) * len;
      const dy = Math.sin(rad) * len;
      const duration = 480 + Math.random() * 520;
      const g = document.createElementNS(svgNS, "g");
      const tail = document.createElementNS(svgNS, "line");
      tail.setAttribute("x1", x);    tail.setAttribute("y1", y);
      tail.setAttribute("x2", x+dx); tail.setAttribute("y2", y+dy);
      tail.setAttribute("stroke", "#cce0ff");
      tail.setAttribute("stroke-width", "1");
      tail.setAttribute("stroke-opacity", "0.5");
      const head = document.createElementNS(svgNS, "rect");
      head.setAttribute("x", x+dx-1); head.setAttribute("y", y+dy-1);
      head.setAttribute("width", "2"); head.setAttribute("height", "2");
      head.setAttribute("fill", "#ddeeff");
      g.appendChild(tail);
      g.appendChild(head);
      container.appendChild(g);
      const anim = g.animate([
        { opacity: 0, transform: 'translate(0,0)' },
        { opacity: 1, transform: `translate(${dx*.15}px,${dy*.15}px)`, offset: 0.08 },
        { opacity: 0.8, transform: `translate(${dx*.6}px,${dy*.6}px)`,  offset: 0.5  },
        { opacity: 0, transform: `translate(${dx*1.8}px,${dy*1.8}px)` }
      ], { duration, easing: 'linear', fill: 'forwards' });
      anim.onfinish = () => g.remove();
      setTimeout(spawnShootingStar, 6000 + Math.random() * 12000);
    }
    setTimeout(spawnShootingStar, 3000 + Math.random() * 6000);
  })();

  // ========================================
  // FALLING SNOW
  // ========================================
  (function initSnow() {
    const svgNS = "http://www.w3.org/2000/svg";
    const container = document.getElementById('snowLayer');
    const particles = [];
    const COUNT = 90;
    for (let i = 0; i < COUNT; i++) {
      const size = Math.random() < 0.65 ? 1 : 2;
      const p = {
        x:           Math.random() * 432,
        y:           Math.random() * 244,
        size,
        speed:       0.22 + Math.random() * 0.52,
        drift:      -0.06 + Math.random() * 0.16,
        opacity:     0.35 + Math.random() * 0.55,
        wobble:      Math.random() * Math.PI * 2,
        wobbleSpeed: 0.012 + Math.random() * 0.018
      };
      const el = document.createElementNS(svgNS, 'rect');
      el.setAttribute('width',   size);
      el.setAttribute('height',  size);
      el.setAttribute('fill',    '#cce4ff');
      el.setAttribute('opacity', p.opacity);
      container.appendChild(el);
      p.el = el;
      particles.push(p);
    }
    function update() {
      for (const p of particles) {
        p.wobble += p.wobbleSpeed;
        p.y += p.speed;
        p.x += p.drift + Math.sin(p.wobble) * 0.14;
        if (p.y > 243)  { p.y = -2; p.x = Math.random() * 432; }
        if (p.x < -2)   p.x = 429;
        if (p.x > 429)  p.x = -2;
        p.el.setAttribute('x', p.x | 0);
        p.el.setAttribute('y', p.y | 0);
      }
      requestAnimationFrame(update);
    }
    update();
  })();

  // ========================================
  // WEB AUDIO — WINTER WIND
  // ========================================
  let audioCtx   = null;
  let masterGain = null;
  let allSources = [];

  function createWinterSound() {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('vSl').value) / 100;
    masterGain.connect(audioCtx.destination);

    // ── LAYER 1: Wind howl (band-passed brown noise + slow LFO gust) ──
    const windSrc = audioCtx.createBufferSource();
    windSrc.buffer = createBrownNoise(8);
    windSrc.loop = true;
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';  hpf.frequency.value = 380;  hpf.Q.value = 0.6;
    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';   lpf.frequency.value = 1600; lpf.Q.value = 1.4;
    const windGain = audioCtx.createGain();
    windGain.gain.value = 0.38;
    // Slow gust LFO
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.065;
    lfo.type = 'sine';
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.16;
    lfo.connect(lfoGain);
    lfoGain.connect(windGain.gain);
    lfo.start();
    windSrc.connect(hpf); hpf.connect(lpf); lpf.connect(windGain);
    windGain.connect(masterGain);
    windSrc.start();
    allSources.push({ source: windSrc, gain: windGain });

    // ── LAYER 2: Deep low rumble ──
    playLoop(createBrownNoise(6), 'lowpass', 95, 0.5, 0.18);

    // ── LAYER 3: Faint indoor fireplace crackle ──
    playLoopDirect(createCrackleBuffer(8), 0.22);
  }

  function createBrownNoise(seconds) {
    const len    = audioCtx.sampleRate * seconds;
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data   = buffer.getChannelData(0);
    let v = 0;
    for (let i = 0; i < len; i++) {
      v = (v + (Math.random() * 2 - 1) * 0.02) / 1.02;
      data[i] = v * 3.5;
    }
    return buffer;
  }

  function createCrackleBuffer(seconds) {
    const sr   = audioCtx.sampleRate;
    const len  = sr * seconds;
    const buf  = audioCtx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = 0;
    const numEvents = Math.floor(seconds * 4);
    for (let e = 0; e < numEvents; e++) {
      const start  = Math.floor(Math.random() * (len - sr * 0.1));
      const spikes = 2 + Math.floor(Math.random() * 4);
      for (let s = 0; s < spikes; s++) {
        const off = start + Math.floor(Math.random() * sr * 0.04);
        if (off >= len) continue;
        const amp  = 0.18 + Math.random() * 0.45;
        const sign = Math.random() > 0.5 ? 1 : -1;
        data[off] = sign * amp;
        if (off+1 < len) data[off+1] = sign * amp * (0.2 + Math.random() * 0.3);
        if (off+2 < len) data[off+2] = sign * amp * Math.random() * 0.15;
        const tl = 4 + Math.floor(Math.random() * 8);
        for (let t = 3; t < 3+tl && off+t < len; t++)
          data[off+t] += (Math.random()*2-1) * amp * 0.1 * (1 - t/(tl+3));
      }
    }
    return buf;
  }

  function playLoop(buffer, filterType, freq, Q, vol) {
    const src    = audioCtx.createBufferSource();
    src.buffer   = buffer;
    src.loop     = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type  = filterType; filter.frequency.value = freq; filter.Q.value = Q;
    const gain   = audioCtx.createGain();
    gain.gain.value = vol;
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    src.start();
    allSources.push({ source: src, gain });
  }

  function playLoopDirect(buffer, vol) {
    const src  = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.loop   = true;
    const gain = audioCtx.createGain();
    gain.gain.value = vol;
    src.connect(gain); gain.connect(masterGain);
    src.start();
    allSources.push({ source: src, gain });
  }

  initSceneAudio({
    onStart() {
      if (!audioCtx) { createWinterSound(); } else { audioCtx.resume(); }
    },
    onStop() {
      if (audioCtx) audioCtx.suspend();
    },
    onVolumeChange(v) {
      if (masterGain) masterGain.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.1);
    }
  });
</script>
</body>
