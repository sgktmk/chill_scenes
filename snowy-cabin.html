<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .scene-container {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-width: 100vw;
    max-height: 100vh;
  }
  @media (min-aspect-ratio: 16/9) {
    .scene-container {
      height: 100vh;
      width: 177.78vh;
    }
  }
  svg { width: 100%; height: 100%; image-rendering: pixelated; }
  /* ===== STAR TWINKLE ===== */
  @keyframes twinkle1 { 0%,100%{opacity:.3}50%{opacity:1} }
  @keyframes twinkle2 { 0%,100%{opacity:.5}50%{opacity:.1} }
  @keyframes twinkle3 { 0%,100%{opacity:.7}50%{opacity:.2} }
  .star-t1 { animation: twinkle1 3s ease-in-out infinite; }
  .star-t2 { animation: twinkle2 4s ease-in-out infinite 1s; }
  .star-t3 { animation: twinkle3 5s ease-in-out infinite 2s; }
  .star-t4 { animation: twinkle1 3.5s ease-in-out infinite 0.5s; }
  .star-t5 { animation: twinkle2 4.5s ease-in-out infinite 1.5s; }
  .star-t6 { animation: twinkle3 2.8s ease-in-out infinite 0.8s; }
  /* ===== WINDOW GLOW ===== */
  @keyframes windowGlow {
    0%   { opacity: 0.75; }
    25%  { opacity: 0.88; }
    50%  { opacity: 0.7; }
    75%  { opacity: 0.85; }
    100% { opacity: 0.75; }
  }
  .window-glow { animation: windowGlow 4s ease-in-out infinite; }
  .window-glow2 { animation: windowGlow 4s ease-in-out infinite 2s; }
  /* ===== CHIMNEY SMOKE ===== */
  @keyframes cSmoke1 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .35 }
    30%  { transform: translate(4px,-22px) scaleX(1.3); opacity: .25 }
    60%  { transform: translate(8px,-50px) scaleX(1.8); opacity: .12 }
    100% { transform: translate(14px,-90px) scaleX(2.5); opacity: 0 }
  }
  @keyframes cSmoke2 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .3 }
    30%  { transform: translate(-3px,-20px) scaleX(1.2); opacity: .2 }
    60%  { transform: translate(5px,-48px) scaleX(1.6); opacity: .1 }
    100% { transform: translate(10px,-88px) scaleX(2.2); opacity: 0 }
  }
  @keyframes cSmoke3 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .28 }
    30%  { transform: translate(2px,-25px) scaleX(1.15); opacity: .18 }
    60%  { transform: translate(6px,-52px) scaleX(1.5); opacity: .1 }
    100% { transform: translate(12px,-95px) scaleX(2); opacity: 0 }
  }
  .cSmoke1 { animation: cSmoke1 5s ease-out infinite; }
  .cSmoke2 { animation: cSmoke2 5.5s ease-out infinite 1.8s; }
  .cSmoke3 { animation: cSmoke3 4.8s ease-out infinite 3.2s; }
  /* ===== GROUND GLOW ===== */
  @keyframes groundGlow {
    0%   { opacity: .18; }
    30%  { opacity: .25; }
    60%  { opacity: .15; }
    100% { opacity: .18; }
  }
  .ground-glow { animation: groundGlow 4s ease-in-out infinite; }
  .ground-glow2 { animation: groundGlow 4s ease-in-out infinite 2s; }
</style>
