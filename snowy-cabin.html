<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .scene-container {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-width: 100vw;
    max-height: 100vh;
  }
  @media (min-aspect-ratio: 16/9) {
    .scene-container {
      height: 100vh;
      width: 177.78vh;
    }
  }
  svg { width: 100%; height: 100%; image-rendering: pixelated; }
  /* ===== STAR TWINKLE ===== */
  @keyframes twinkle1 { 0%,100%{opacity:.3}50%{opacity:1} }
  @keyframes twinkle2 { 0%,100%{opacity:.5}50%{opacity:.1} }
  @keyframes twinkle3 { 0%,100%{opacity:.7}50%{opacity:.2} }
  .star-t1 { animation: twinkle1 3s ease-in-out infinite; }
  .star-t2 { animation: twinkle2 4s ease-in-out infinite 1s; }
  .star-t3 { animation: twinkle3 5s ease-in-out infinite 2s; }
  .star-t4 { animation: twinkle1 3.5s ease-in-out infinite 0.5s; }
  .star-t5 { animation: twinkle2 4.5s ease-in-out infinite 1.5s; }
  .star-t6 { animation: twinkle3 2.8s ease-in-out infinite 0.8s; }
  /* ===== WINDOW GLOW ===== */
  @keyframes windowGlow {
    0%   { opacity: 0.78; }
    25%  { opacity: 0.92; }
    50%  { opacity: 0.72; }
    75%  { opacity: 0.88; }
    100% { opacity: 0.78; }
  }
  .window-glow { animation: windowGlow 4s ease-in-out infinite; }
  .window-glow2 { animation: windowGlow 4s ease-in-out infinite 2s; }
  /* ===== CHIMNEY SMOKE ===== */
  @keyframes cSmoke1 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .4 }
    25%  { transform: translate(3px,-18px) scaleX(1.2); opacity: .32 }
    50%  { transform: translate(7px,-40px) scaleX(1.6); opacity: .18 }
    75%  { transform: translate(10px,-65px) scaleX(2); opacity: .08 }
    100% { transform: translate(14px,-90px) scaleX(2.5); opacity: 0 }
  }
  @keyframes cSmoke2 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .35 }
    25%  { transform: translate(-2px,-15px) scaleX(1.15); opacity: .28 }
    50%  { transform: translate(4px,-38px) scaleX(1.5); opacity: .15 }
    75%  { transform: translate(8px,-60px) scaleX(1.9); opacity: .06 }
    100% { transform: translate(11px,-85px) scaleX(2.3); opacity: 0 }
  }
  @keyframes cSmoke3 {
    0%   { transform: translate(0,0) scaleX(1); opacity: .32 }
    25%  { transform: translate(2px,-20px) scaleX(1.25); opacity: .24 }
    50%  { transform: translate(6px,-42px) scaleX(1.7); opacity: .14 }
    75%  { transform: translate(9px,-68px) scaleX(2.1); opacity: .05 }
    100% { transform: translate(13px,-92px) scaleX(2.6); opacity: 0 }
  }
  .cSmoke1 { animation: cSmoke1 5s ease-out infinite; }
  .cSmoke2 { animation: cSmoke2 5.8s ease-out infinite 1.8s; }
  .cSmoke3 { animation: cSmoke3 5.3s ease-out infinite 3.5s; }
  /* ===== GROUND GLOW ===== */
  @keyframes groundGlow {
    0%   { opacity: .2; }
    30%  { opacity: .28; }
    60%  { opacity: .16; }
    100% { opacity: .2; }
  }
  .ground-glow { animation: groundGlow 4s ease-in-out infinite; }
  .ground-glow2 { animation: groundGlow 4s ease-in-out infinite 2s; }
</style>
