<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .scene-container {
    position: relative;
    width: 100vw;
    height: 56.25vw;
    max-width: 100vw;
    max-height: 100vh;
  }
  @media (min-aspect-ratio: 16/9) {
    .scene-container {
      height: 100vh;
      width: 177.78vh;
    }
  }
  svg { width: 100%; height: 100%; image-rendering: pixelated; }
  /* ===== FLAME ANIMATIONS ===== */
  @keyframes flameUnifiedSway {
    0%   { transform: translate(0, 0) rotate(0deg); }
    20%  { transform: translate(1.5px, -0.5px) rotate(0.8deg); }
    40%  { transform: translate(-0.5px, 0) rotate(-0.3deg); }
    60%  { transform: translate(-1.5px, -0.5px) rotate(-0.7deg); }
    80%  { transform: translate(0.5px, 0) rotate(0.3deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }
  .flame-all {
    animation: flameUnifiedSway 4s ease-in-out infinite;
    transform-origin: 213px 198px;
  }
  @keyframes flameBase {
    0%   { transform: scaleX(1); }
    30%  { transform: scaleX(1.01); }
    60%  { transform: scaleX(0.99); }
    100% { transform: scaleX(1); }
  }
  @keyframes flameMid {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(0.5px, -0.5px); }
    50%  { transform: translate(-0.5px, 0); }
    75%  { transform: translate(0.3px, -0.3px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes flameTop {
    0%   { transform: translate(0, 0) scaleY(1); }
    20%  { transform: translate(0.3px, -0.3px) scaleY(1.015); }
    50%  { transform: translate(-0.4px, 0) scaleY(0.98); }
    80%  { transform: translate(0.2px, -0.2px) scaleY(1.01); }
    100% { transform: translate(0, 0) scaleY(1); }
  }
  @keyframes flameTip {
    0%   { transform: translate(0, 0) scaleY(1); opacity: 0.9; }
    15%  { transform: translate(0.3px, -0.3px) scaleY(1.02); opacity: 0.78; }
    35%  { transform: translate(-0.4px, 0) scaleY(0.97); opacity: 0.88; }
    55%  { transform: translate(0.3px, -0.4px) scaleY(1.03); opacity: 0.72; }
    75%  { transform: translate(-0.2px, -0.2px) scaleY(0.98); opacity: 0.85; }
    100% { transform: translate(0, 0) scaleY(1); opacity: 0.9; }
  }
  @keyframes coreFlicker {
    0%   { opacity: 0.7; }
    20%  { opacity: 0.85; }
    40%  { opacity: 0.6; }
    55%  { opacity: 0.8; }
    70%  { opacity: 0.55; }
    85%  { opacity: 0.75; }
    100% { opacity: 0.7; }
  }
  .flame-base { animation: flameBase 3.2s ease-in-out infinite; transform-origin: center bottom; }
  .flame-mid  { animation: flameMid 2.8s ease-in-out infinite 0.2s; transform-origin: center bottom; }
  .flame-top  { animation: flameTop 2.4s ease-in-out infinite 0.4s; transform-origin: center bottom; }
  .flame-tip  { animation: flameTip 2.0s ease-in-out infinite 0.1s; transform-origin: center bottom; }
  .flame-tip2 { animation: coreFlicker 1.8s ease-in-out infinite 0.15s; transform-origin: center bottom; }
  .flame-tip3 { animation: flameTip 2.2s ease-in-out infinite 0.5s; transform-origin: center bottom; }
  /* ===== SPARK ANIMATIONS ===== */
  @keyframes spark1 { 0%{transform:translate(0,0);opacity:1}50%{transform:translate(-8px,-40px);opacity:.8}100%{transform:translate(-12px,-80px);opacity:0} }
  @keyframes spark2 { 0%{transform:translate(0,0);opacity:1}50%{transform:translate(6px,-35px);opacity:.7}100%{transform:translate(10px,-75px);opacity:0} }
  @keyframes spark3 { 0%{transform:translate(0,0);opacity:1}50%{transform:translate(-3px,-45px);opacity:.9}100%{transform:translate(5px,-90px);opacity:0} }
  @keyframes spark4 { 0%{transform:translate(0,0);opacity:1}50%{transform:translate(10px,-30px);opacity:.6}100%{transform:translate(8px,-70px);opacity:0} }
  @keyframes spark5 { 0%{transform:translate(0,0);opacity:1}50%{transform:translate(-5px,-50px);opacity:.85}100%{transform:translate(-15px,-95px);opacity:0} }
  @keyframes spark6 { 0%{transform:translate(0,0);opacity:0}10%{opacity:1}50%{transform:translate(7px,-38px);opacity:.7}100%{transform:translate(3px,-82px);opacity:0} }
  .spark1 { animation: spark1 2.5s ease-out infinite; }
  .spark2 { animation: spark2 3.1s ease-out infinite 0.8s; }
  .spark3 { animation: spark3 2.8s ease-out infinite 1.5s; }
  .spark4 { animation: spark4 3.4s ease-out infinite 0.4s; }
  .spark5 { animation: spark5 2.2s ease-out infinite 2.0s; }
  .spark6 { animation: spark6 2.9s ease-out infinite 1.2s; }
  /* ===== SMOKE ANIMATIONS ===== */
  @keyframes smoke1 { 0%{transform:translate(0,0) scaleX(1);opacity:.35}30%{transform:translate(-5px,-30px) scaleX(1.2);opacity:.25}60%{transform:translate(-10px,-60px) scaleX(1.5);opacity:.15}100%{transform:translate(-8px,-100px) scaleX(2);opacity:0} }
  @keyframes smoke2 { 0%{transform:translate(0,0) scaleX(1);opacity:.3}30%{transform:translate(4px,-25px) scaleX(1.3);opacity:.22}60%{transform:translate(8px,-55px) scaleX(1.6);opacity:.12}100%{transform:translate(12px,-95px) scaleX(2.2);opacity:0} }
  @keyframes smoke3 { 0%{transform:translate(0,0) scaleX(1);opacity:.25}30%{transform:translate(-3px,-35px) scaleX(1.15);opacity:.18}60%{transform:translate(5px,-65px) scaleX(1.4);opacity:.1}100%{transform:translate(3px,-105px) scaleX(1.8);opacity:0} }
  .smoke1 { animation: smoke1 4.5s ease-out infinite; }
  .smoke2 { animation: smoke2 5.0s ease-out infinite 1.5s; }
  .smoke3 { animation: smoke3 4.2s ease-out infinite 3.0s; }
  /* ===== GLOW ===== */
  @keyframes glowPulse { 0%{opacity:.25}25%{opacity:.35}50%{opacity:.2}75%{opacity:.32}100%{opacity:.25} }
  .glow { animation: glowPulse 3s ease-in-out infinite; }
  @keyframes glowGround { 0%{opacity:.15}33%{opacity:.25}66%{opacity:.12}100%{opacity:.15} }
  .glow-ground { animation: glowGround 2.5s ease-in-out infinite 0.5s; }
  /* ===== STAR TWINKLE ===== */
  @keyframes twinkle1 { 0%,100%{opacity:.3}50%{opacity:1} }
  @keyframes twinkle2 { 0%,100%{opacity:.5}50%{opacity:.1} }
  @keyframes twinkle3 { 0%,100%{opacity:.7}50%{opacity:.2} }
  .star-t1 { animation: twinkle1 3s ease-in-out infinite; }
  .star-t2 { animation: twinkle2 4s ease-in-out infinite 1s; }
  .star-t3 { animation: twinkle3 5s ease-in-out infinite 2s; }
  .star-t4 { animation: twinkle1 3.5s ease-in-out infinite 0.5s; }
  .star-t5 { animation: twinkle2 4.5s ease-in-out infinite 1.5s; }
  .star-t6 { animation: twinkle3 2.8s ease-in-out infinite 0.8s; }
  /* ===== AUDIO PANEL ===== */
  .ap {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: rgba(10,10,18,.75);
    border: 2px solid rgba(255,150,50,.3);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  .ab {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,150,50,.5);
    background: rgba(255,80,20,.12);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    position: relative;
    transition: all .3s;
  }
  .ab:hover { background: rgba(255,80,20,.3); }
  .ab.on {
    background: rgba(255,80,20,.35);
    border-color: #fa4;
    box-shadow: 0 0 10px rgba(255,120,30,.4);
  }
  .ab.on .wi { display: flex; }
  .wi {
    display: none;
    position: absolute;
    top: -7px;
    right: -3px;
    gap: 1px;
  }
  .wi span {
    width: 2px;
    background: #fa4;
    border-radius: 1px;
    animation: wb .8s ease-in-out infinite;
  }
  .wi span:nth-child(1) { height: 5px; }
  .wi span:nth-child(2) { height: 8px; animation-delay: .15s; }
  .wi span:nth-child(3) { height: 4px; animation-delay: .3s; }
  @keyframes wb { 0%,100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  .vs {
    -webkit-appearance: none;
    width: 65px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,150,50,.25);
    outline: none;
  }
  .vs::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #f93;
    cursor: pointer;
    border: 2px solid rgba(255,200,100,.5);
  }
  .vl {
    color: rgba(255,180,80,.6);
    font-size: 10px;
    min-width: 24px;
    text-align: center;
  }
  .back {
    position: fixed;
    top: 16px;
    left: 16px;
    background: rgba(10,10,18,.65);
    border: 2px solid rgba(255,150,50,.25);
    border-radius: 8px;
    padding: 6px 12px;
    z-index: 100;
    backdrop-filter: blur(6px);
    text-decoration: none;
    color: rgba(255,180,80,.7);
    font-size: 13px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: border-color .3s, color .3s;
  }
  .back:hover {
    border-color: rgba(255,150,50,.5);
    color: rgba(255,200,100,.9);
  }
</style>
</head>

  <g>

    <rect class="spark3" x="213" y="158" width="1" height="1" fill="#ffdd33"/>
    <rect class="spark4" x="209" y="164" width="2" height="2" fill="#ff8800"/>
    <rect class="spark5" x="214" y="156" width="1" height="1" fill="#ffee44"/>

  <g>

      <rect x="210" y="140" width="6" height="4" fill="#444455" opacity="0.3"/>

      <rect x="211" y="130" width="4" height="3" fill="#404050" opacity="0.2"/>

  <!-- ===== LIGHT REFLECTION ON STONES ===== -->
  <g opacity="0.4" class="glow">
    <rect x="179" y="194" width="4" height="1" fill="#ff6633"/>
    <rect x="189" y="196" width="3" height="1" fill="#ff7744"/>
    <rect x="197" y="195" width="4" height="1" fill="#ff8844"/>
    <rect x="230" y="195" width="4" height="1" fill="#ff8844"/>

</div>
<div class="ap">
  <button class="ab" id="aBtn"><span style="position:relative">🔇<span class="wi"><span></span><span></span><span></span></span></span></button>
  <input type="range" class="vs" id="vSl" min="0" max="100" value="40"/>
  <span class="vl" id="vLb">40%</span>
</div>
<script>
  // ========================================
  // SHOOTING STARS
  // ========================================
  (function initShootingStars() {
    const svgNS = "http://www.w3.org/2000/svg";
    const container = document.getElementById('shootingStars');
    function spawnShootingStar() {
      const x = 20 + Math.random() * 380;
      const y = 3 + Math.random() * 60;
      const len = 14 + Math.random() * 22;
      const angle = 18 + Math.random() * 28;
      const rad = angle * Math.PI / 180;
      const dx = Math.cos(rad) * len;
      const dy = Math.sin(rad) * len;
      const duration = 500 + Math.random() * 500;
      const g = document.createElementNS(svgNS, "g");
      const tail = document.createElementNS(svgNS, "line");
      tail.setAttribute("x1", x);
      tail.setAttribute("y1", y);
      tail.setAttribute("x2", x + dx);
      tail.setAttribute("y2", y + dy);
      tail.setAttribute("stroke", "#ffffff");
      tail.setAttribute("stroke-width", "1");
      tail.setAttribute("stroke-opacity", "0.5");
      const head = document.createElementNS(svgNS, "rect");
      head.setAttribute("x", x + dx - 1);
      head.setAttribute("y", y + dy - 1);
      head.setAttribute("width", "2");
      head.setAttribute("height", "2");
      head.setAttribute("fill", "#ffffff");
      g.appendChild(tail);
      g.appendChild(head);
      container.appendChild(g);
      const anim = g.animate([
        { opacity: 0, transform: 'translate(0,0)' },
        { opacity: 1, transform: `translate(${dx*0.15}px,${dy*0.15}px)`, offset: 0.08 },
        { opacity: 0.85, transform: `translate(${dx*0.6}px,${dy*0.6}px)`, offset: 0.5 },
        { opacity: 0, transform: `translate(${dx*1.8}px,${dy*1.8}px)` }
      ], { duration, easing: 'linear', fill: 'forwards' });
      anim.onfinish = () => g.remove();
      setTimeout(spawnShootingStar, 5000 + Math.random() * 10000);
    }
    setTimeout(spawnShootingStar, 3000 + Math.random() * 5000);
  })();
  // ========================================
  // WEB AUDIO — CAMPFIRE SOUND (v3)
  // ========================================
  let audioCtx = null;
  let isPlaying = false;
  let masterGain = null;
  let allSources = [];
  function createCampfireSound() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = parseFloat(document.getElementById('vSl').value) / 100;
    masterGain.connect(audioCtx.destination);
    // ============================
    // LAYER 1: Low rumble (the "roar")
    // ============================
    playLoop(createBrownNoise(6), 'lowpass', 120, 0.3, 0.3);
    // ============================
    // LAYER 2: Mid warmth
    // ============================
    playLoop(createBrownNoise(6), 'lowpass', 200, 0.4, 0.15);
    // ============================
    // LAYER 3: Crackle track — no filter, raw transients
    // ============================
    playLoopDirect(createCrackleBuffer(8), 0.9);
    // ============================
    // LAYER 4: Second crackle track (offset timing)
    // ============================
    playLoopDirect(createCrackleBuffer(10), 0.7);
  }
  // Generate brown noise buffer (for ambient rumble)
  function createBrownNoise(seconds) {
    const len = audioCtx.sampleRate * seconds;
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let v = 0;
    for (let i = 0; i < len; i++) {
      v = (v + (Math.random() * 2 - 1) * 0.02) / 1.02;
      data[i] = v * 3.5;
    }
    return buffer;
  }
  // Generate crackle buffer — mostly silence with random sharp spikes
  function createCrackleBuffer(seconds) {
    const sr = audioCtx.sampleRate;
    const len = sr * seconds;
    const buffer = audioCtx.createBuffer(1, len, sr);
    const data = buffer.getChannelData(0);
    // Fill with silence first
    for (let i = 0; i < len; i++) data[i] = 0;
    // Place random crackle events throughout the buffer
    // Each "crackle" = a burst of 3-8 sharp spikes over 10-80ms
    const numEvents = Math.floor(seconds * 6);  // ~6 crackles per second
    for (let e = 0; e < numEvents; e++) {
      const startSample = Math.floor(Math.random() * (len - sr * 0.1));
      const spikeCount = 3 + Math.floor(Math.random() * 6);
      for (let s = 0; s < spikeCount; s++) {
        // Each spike is 1-4 samples apart, spread over 5-40ms
        const offset = startSample + Math.floor(Math.random() * sr * 0.04);
        if (offset >= len) continue;
        const amplitude = 0.3 + Math.random() * 0.7;  // strong!
        const sign = Math.random() > 0.5 ? 1 : -1;
        // The spike itself: 1-3 samples
        data[offset] = sign * amplitude;
        if (offset + 1 < len) data[offset + 1] = sign * amplitude * (0.3 + Math.random() * 0.4);
        if (offset + 2 < len) data[offset + 2] = sign * amplitude * Math.random() * 0.2;
        // Tiny decay tail (5-15 samples of noise)
        const tailLen = 5 + Math.floor(Math.random() * 10);
        for (let t = 3; t < 3 + tailLen && offset + t < len; t++) {
          data[offset + t] += (Math.random() * 2 - 1) * amplitude * 0.15 * (1 - t / (tailLen + 3));
        }
      }
    }
    return buffer;
  }
  // Play a buffer as a looping source through a filter
  function playLoop(buffer, filterType, filterFreq, filterQ, volume) {
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = filterType;
    filter.frequency.value = filterFreq;
    filter.Q.value = filterQ;
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    source.start();
    allSources.push({ source, gain });
  }
  // Play a buffer direct — no filter at all
  function playLoopDirect(buffer, volume) {
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const gain = audioCtx.createGain();
    gain.gain.value = volume;
    source.connect(gain);
    gain.connect(masterGain);
    source.start();
    allSources.push({ source, gain });
  }
  (function() {
    const btn = document.getElementById('aBtn');
    const slider = document.getElementById('vSl');
    const label = document.getElementById('vLb');
    btn.addEventListener('click', () => {
      if (!isPlaying) {
        if (!audioCtx) {
          createCampfireSound();
        } else {
          audioCtx.resume();
        }
        isPlaying = true;
        btn.classList.add('on');
        btn.querySelector('span').firstChild.textContent = '🔊';
      } else {
        isPlaying = false;
        if (audioCtx) audioCtx.suspend();
        btn.classList.remove('on');
        btn.querySelector('span').firstChild.textContent = '🔇';
      }
    });
    slider.addEventListener('input', () => {
      const v = slider.value;
      label.textContent = v + '%';
      if (masterGain) {
        masterGain.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.1);
      }
    });
  })();
</script>
</body>
