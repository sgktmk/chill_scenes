<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacewalk — Chill Scenes</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="/shared/scene-ui.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050712;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene-container{position:relative;width:100vw;height:56.25vw;max-width:100vw;max-height:100vh}
  @media (min-aspect-ratio: 16/9){.scene-container{height:100vh;width:177.78vh}}
  svg{width:100%;height:100%;display:block;image-rendering:pixelated}
  .tw1{animation:tw 2.8s ease-in-out infinite}
  .tw2{animation:tw 4.2s ease-in-out infinite 1.1s}
  .tw3{animation:tw 3.5s ease-in-out infinite .5s}
  @keyframes tw{0%,100%{opacity:.35}50%{opacity:.95}}
  .astro-bob{animation:bob 4.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.5px)}}
</style>
</head>
<body>
<a class="back" href="/">&#8592; Top</a>
<div class="scene-container">
  <svg id="scene" viewBox="0 0 426 240" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="spaceBg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0d1230"/>
        <stop offset="60%" stop-color="#090d20"/>
        <stop offset="100%" stop-color="#04060f"/>
      </linearGradient>
      <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#6f6aff" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#6f6aff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#22d6ff" stop-opacity=".28"/>
        <stop offset="100%" stop-color="#22d6ff" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <rect width="426" height="240" fill="url(#spaceBg)"/>

    <g id="bgFar"></g>
    <g id="bgMid"></g>

    <g opacity=".65">
      <ellipse cx="286" cy="65" rx="92" ry="38" fill="url(#neb1)"/>
      <ellipse cx="366" cy="145" rx="78" ry="30" fill="url(#neb2)"/>
    </g>

    <g id="planetLayer"></g>

    <g class="astro-bob" transform="translate(24 92)">
      <g id="astronaut">
        <rect x="0" y="24" width="4" height="1" fill="#9bb6ff" opacity=".7"/>
        <rect x="4" y="21" width="4" height="7" fill="#88a6f0"/>
        <rect x="8" y="18" width="2" height="13" fill="#6f91dd"/>

        <rect x="13" y="14" width="12" height="12" fill="#e8edf8"/>
        <rect x="15" y="16" width="8" height="6" fill="#77cfff"/>
        <rect x="13" y="24" width="12" height="2" fill="#bcc8e6"/>

        <rect x="11" y="26" width="16" height="16" fill="#f4f7ff"/>
        <rect x="13" y="28" width="12" height="4" fill="#d6def2"/>
        <rect x="16" y="33" width="6" height="3" fill="#8ef6ff"/>
        <rect x="17" y="34" width="1" height="1" fill="#0e2d52"/>
        <rect x="19" y="34" width="1" height="1" fill="#0e2d52"/>
        <rect x="12" y="42" width="4" height="3" fill="#d8e1f5"/>
        <rect x="22" y="42" width="4" height="3" fill="#d8e1f5"/>
        <rect x="15" y="42" width="8" height="3" fill="#c4d1ee"/>

        <rect x="8" y="29" width="3" height="8" fill="#f0f4ff"/>
        <rect x="27" y="30" width="3" height="8" fill="#f0f4ff"/>

        <rect x="14" y="45" width="4" height="7" fill="#edf2ff"/>
        <rect x="20" y="45" width="4" height="7" fill="#edf2ff"/>
        <rect x="13" y="52" width="6" height="2" fill="#a8b7de"/>
        <rect x="19" y="52" width="6" height="2" fill="#a8b7de"/>
      </g>
    </g>
  </svg>
</div>

<div class="ap">
  <button class="ab" id="aBtn"><span style="position:relative">🔇<span class="wi"><span></span><span></span><span></span></span></span></button>
  <input type="range" class="vs" id="vSl" min="0" max="100" value="35"/>
  <span class="vl" id="vLb">35%</span>
</div>

<script src="/shared/scene-ui.js"></script>
<script>
(() => {
  const W = 426;
  const far = document.getElementById('bgFar');
  const mid = document.getElementById('bgMid');
  const planet = document.getElementById('planetLayer');

  const starsFar = Array.from({length: 60}, (_, i) => ({
    x: (i * 67) % (W * 2),
    y: 8 + ((i * 29) % 180),
    s: i % 7 === 0 ? 2 : 1,
    c: i % 5 === 0 ? '#c6cbff' : '#dfe4ff',
    cls: i % 3 === 0 ? 'tw1' : (i % 3 === 1 ? 'tw2' : 'tw3')
  }));

  const starsMid = Array.from({length: 26}, (_, i) => ({
    x: (i * 143) % (W * 2),
    y: 20 + ((i * 41) % 170),
    s: 2,
    c: i % 2 ? '#9de2ff' : '#ffffff'
  }));

  function drawStars(group, list) {
    group.textContent = '';
    for (const st of list) {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('x', st.x);
      r.setAttribute('y', st.y);
      r.setAttribute('width', st.s);
      r.setAttribute('height', st.s);
      r.setAttribute('fill', st.c);
      if (st.cls) r.setAttribute('class', st.cls);
      group.appendChild(r);
    }
  }

  function drawPlanets() {
    planet.innerHTML = `
      <g transform="translate(250 132)">
        <circle cx="0" cy="0" r="26" fill="#8d6eff" opacity="0.9"/>
        <rect x="-14" y="-8" width="10" height="3" fill="#bca9ff" opacity="0.45"/>
        <rect x="4" y="5" width="9" height="3" fill="#dccfff" opacity="0.35"/>
      </g>
      <g transform="translate(338 74)">
        <circle cx="0" cy="0" r="11" fill="#ffcc7c" opacity="0.95"/>
        <rect x="-4" y="-2" width="3" height="1" fill="#ffdca1"/>
      </g>
      <g transform="translate(172 88)">
        <ellipse cx="0" cy="0" rx="17" ry="6" fill="#89ecff" opacity="0.5"/>
      </g>`;
  }

  drawStars(far, starsFar);
  drawStars(mid, starsMid);
  drawPlanets();

  let t0 = performance.now();
  function tick(now) {
    const t = (now - t0) / 1000;
    far.setAttribute('transform', `translate(${-(t * 8 % W)} 0)`);
    mid.setAttribute('transform', `translate(${-(t * 16 % W)} 0)`);
    planet.setAttribute('transform', `translate(${-(t * 5 % W)} 0)`);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

let audioCtx = null;
let master = null;
const active = [];

function createNoiseBuffer(seconds) {
  const len = audioCtx.sampleRate * seconds;
  const b = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = b.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.018 * white) / 1.018;
    d[i] = last * 2.1;
  }
  return b;
}

function startSpaceAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  master = audioCtx.createGain();
  master.gain.value = Number(document.getElementById('vSl').value) / 100;
  master.connect(audioCtx.destination);

  const drone = audioCtx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 74;
  const droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.07;
  drone.connect(droneGain).connect(master);
  drone.start();
  active.push({ source: drone, gain: droneGain });

  const shimmer = audioCtx.createOscillator();
  shimmer.type = 'triangle';
  shimmer.frequency.value = 220;
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.07;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 8;
  lfo.connect(lfoGain).connect(shimmer.frequency);
  const shimmerGain = audioCtx.createGain();
  shimmerGain.gain.value = 0.015;
  shimmer.connect(shimmerGain).connect(master);
  shimmer.start();
  lfo.start();
  active.push({ source: shimmer, gain: shimmerGain }, { source: lfo, gain: lfoGain });

  const noise = audioCtx.createBufferSource();
  noise.buffer = createNoiseBuffer(8);
  noise.loop = true;
  const nFilter = audioCtx.createBiquadFilter();
  nFilter.type = 'lowpass';
  nFilter.frequency.value = 280;
  const nGain = audioCtx.createGain();
  nGain.gain.value = 0.012;
  noise.connect(nFilter).connect(nGain).connect(master);
  noise.start();
  active.push({ source: noise, gain: nGain });
}

initSceneAudio({
  onStart() {
    if (!audioCtx) startSpaceAudio();
    else audioCtx.resume();
  },
  onStop() {
    if (audioCtx) audioCtx.suspend();
  },
  onVolumeChange(v) {
    if (master) master.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.08);
  }
});
</script>
</body>
</html>
