<script>
// ============================================================
// AUDIO
// ============================================================
(function() {
  let audioCtx, masterGain, isPlaying = false;

  function startAudio(volume) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volume / 100;
    masterGain.connect(audioCtx.destination);
    // TODO: Build and connect audio nodes here
  }

  initSceneAudio({
    onStart(v) {
      if (!audioCtx) startAudio(v); else audioCtx.resume();
      isPlaying = true;
    },
    onStop() {
      isPlaying = false;
      if (audioCtx) audioCtx.suspend();
    },
    onVolumeChange(v) {
      if (masterGain) masterGain.gain.setTargetAtTime(v / 100, audioCtx.currentTime, 0.1);
    }
  });
})();

// ============================================================
// SCREENSHOT

initSceneScreenshot(document.getElementById('sceneSvg'), 'scene-name.png');
